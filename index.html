<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רדיו מדברים בדס"מ | לוח שידורים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-dark: #c0392b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #080808;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Hero & Header Styles */
        .hero-bg {
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(8,8,8,1)), 
                        url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            padding-top: 80px;
            z-index: 1;
        }

        header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 5px;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 900; 
            font-size: 22px;
            color: #fff;
            text-decoration: none;
        }
        .logo-area .brand-white { color: #ffffff; }
        .logo-area .brand-red { color: var(--primary); }

        .nav-links { 
            display: flex; 
            gap: 15px; 
            list-style: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 5px;
            width: 100%;
            justify-content: center;
        }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 14px; 
            opacity: 0.7;
        }

        /* Player Styles */
        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px 10px 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            min-width: 320px;
            z-index: 10;
        }

        .play-trigger {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            outline: none;
        }
        .play-trigger.is-playing { animation: pulse-red 2.5s infinite; background: #fff; color: var(--primary); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .track-info { text-align: right; flex: 1; }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 800;
            color: var(--primary);
            background: rgba(255, 71, 87, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
        .live-dot.offline { background: #555; }
        .live-dot.active { animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .now-on-air-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            margin: -30px auto 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        .dj-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); background: #111; }

        /* Marquee */
        .scrolling-wrapper {
            background: rgba(255, 71, 87, 0.1);
            color: var(--primary);
            padding: 5px 0;
            font-size: 13px;
            font-weight: 700;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 20px;
        }
        .scrolling-text {
            display: inline-block;
            padding-right: 100%;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100%, 0); }
        }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr; 
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 15px;
        }

        .box-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .free-text-schedule {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Party Section - Horizontal Layout */
        .party-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 15px;
        }

        .party-card {
            background: rgba(30, 30, 30, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex; /* Horizontal by default */
            flex-direction: row;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 250px;
        }
        
        .party-card:hover {
            transform: scale(1.01);
            background: rgba(40, 40, 40, 0.6);
            border-color: rgba(255, 71, 87, 0.3);
        }
        
        .party-image-container {
            width: 35%; /* Fixed width for the image part */
            min-width: 250px;
            background: #000;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--glass-border);
        }

        .party-card-img-blur {
            position: absolute;
            width: 120%;
            height: 120%;
            object-fit: cover;
            filter: blur(15px) brightness(0.4);
            z-index: 1;
        }

        .party-card-img {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 2;
            image-rendering: -webkit-optimize-contrast;
        }

        .party-content { 
            padding: 30px; 
            text-align: right; 
            display: flex;
            flex-direction: column;
            flex: 1;
            background: linear-gradient(to right, rgba(255,255,255,0.02), transparent);
        }

        .party-date-tag {
            background: var(--primary);
            color: #fff;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 15px;
            width: fit-content;
        }

        /* Form Elements */
        input, textarea {
            width:100%; padding:12px; margin-bottom:8px; background:#222; border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:12px; font-size:14px; text-align: right; transition: 0.3s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #2a2a2a; }
        
        .submit-btn {
            width:100%; padding:14px; background:var(--primary); color:#fff; border:none; cursor:pointer; border-radius:12px; font-weight:900; margin-top:5px; transition: 0.3s; font-size: 16px;
        }
        .submit-btn:hover { background: var(--primary-dark); transform: scale(1.02); }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .party-card { flex-direction: column; height: auto; }
            .party-image-container { width: 100%; height: 250px; border-left: none; border-bottom: 1px solid var(--glass-border); }
            .player-container { min-width: 90%; }
            .hero-bg { height: 50vh; padding-top: 100px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div><span class="brand-white">רדיו מדברים</span> <span class="brand-red">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#dashim">ד"שים</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#parties">מסיבות</a>
    </nav>
</header>

<section class="hero-bg">
    <h1 style="font-size: clamp(26px, 6vw, 42px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
    <p style="opacity: 0.6; font-size: 15px;">שידור חי 24/7</p>

    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">מתחבר...</span>
            </div>
            <span id="status-text" style="font-size: 15px; font-weight: 700; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">טוען נגן...</span>
        </div>
        
        <button class="play-trigger" id="master-play-btn">
            <i class="fa-solid fa-play" id="btn-icon"></i>
        </button>
    </div>
</section>

<div class="scrolling-wrapper">
    <div class="scrolling-text" id="marquee-text">ברוכים הבאים לרדיו מדברים בדס"מ - הקול של הקהילה!</div>
</div>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://via.placeholder.com/200?text=OFFLINE" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 11px;">בשידור כרגע</div>
        <h2 id="dj-name-display" style="font-size: 20px; margin-bottom: 2px;">רדיו מדברים בדס"מ</h2>
        <p id="sub-status" style="color: rgba(255,255,255,0.5); font-size: 13px;">טוען נתונים...</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="dashim">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px; margin-bottom: 15px;">שלח ד"ש לשדרן</h2>
        <input type="text" id="msg-name" placeholder="השם שלך">
        <textarea id="msg-content" placeholder="מה תרצו למסור?" style="height:100px; resize: none;"></textarea>
        <button class="submit-btn" onclick="sendGreeting(event)">שלח הודעה</button>
    </div>
    
    <div class="box-container" id="schedule">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px; margin-bottom: 15px;">לוח שידורים - <span id="current-day-label"></span></h2>
        <div id="schedule-content" class="free-text-schedule">טוען לוח שידורים...</div>
    </div>
</div>

<div id="parties" style="padding: 0 15px; max-width: 1200px; margin: 40px auto 10px; text-align: right;">
    <h2 style="border-right: 3px solid var(--primary); padding-right: 10px; display: inline-block;">מסיבות ואירועים</h2>
</div>
<div class="party-grid" id="party-container"></div>

<audio id="audio-engine" preload="none" crossorigin="anonymous"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULT_STREAM = "https://stream.zeno.fm/0r0xa792kwzuv"; 

let isPlaying = false;
let currentStreamUrl = "";
const playBtn = document.getElementById('master-play-btn'), btnIcon = document.getElementById('btn-icon');
const audioEngine = document.getElementById('audio-engine'), statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text'), liveDot = document.getElementById('live-status-dot');

function updateUI() {
    btnIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    if (isPlaying) {
        playBtn.classList.add('is-playing');
        liveDot.classList.add('active');
    } else {
        playBtn.classList.remove('is-playing');
        liveDot.classList.remove('active');
    }
}

function fixUrl(url) {
    if (!url) return DEFAULT_STREAM;
    if (url.startsWith('http://')) return url.replace('http://', 'https://');
    return url;
}

async function togglePlay() {
    if (isPlaying) {
        audioEngine.pause();
        audioEngine.src = "";
        isPlaying = false;
        updateUI();
    } else {
        statusText.innerText = "מתחבר...";
        try {
            const doc = await db.collection('settings').doc('dj_info').get();
            let targetUrl = doc.exists && doc.data().streamUrl ? doc.data().streamUrl : DEFAULT_STREAM;
            currentStreamUrl = fixUrl(targetUrl);
            audioEngine.src = currentStreamUrl;
            audioEngine.load();
            await audioEngine.play();
            isPlaying = true;
            updateUI();
            statusText.innerText = document.getElementById('dj-name-display').innerText || "בשידור";
        } catch (err) {
            statusText.innerText = "שגיאה בחיבור";
            isPlaying = false;
            updateUI();
        }
    }
}

playBtn.addEventListener('click', togglePlay);

// Realtime DJ Updates
db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const d = doc.data();
        let newUrl = fixUrl(d.streamUrl || DEFAULT_STREAM);
        document.getElementById('marquee-text').innerText = d.scrollingText || "ברוכים הבאים לרדיו מדברים בדס\"מ";
        const name = d.name || "";
        if(name && name.trim() !== "") {
            statusText.innerText = isPlaying ? name : "מוכן לשידור";
            document.getElementById('dj-name-display').innerText = name;
            document.getElementById('sub-status').innerText = "שידור חי כרגע";
            if(d.image) document.getElementById('dj-image-display').src = d.image;
            liveText.innerText = "LIVE";
            liveDot.className = "live-dot active";
        } else {
            document.getElementById('dj-name-display').innerText = "שידור אוטומטי";
            document.getElementById('sub-status').innerText = "מוזיקה ללא הפסקה";
            if(d.offlineImage) document.getElementById('dj-image-display').src = d.offlineImage;
            liveText.innerText = "OFFLINE";
            liveDot.className = "live-dot offline";
        }
        currentStreamUrl = newUrl;
    }
});

// Schedule Logic
const daysEng = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
const now = new Date();
document.getElementById('current-day-label').innerText = daysHeb[now.getDay()];

db.collection('settings').doc('schedule').onSnapshot(doc => {
    const container = document.getElementById('schedule-content');
    if(doc.exists) {
        const data = doc.data();
        const todayData = data[daysEng[now.getDay()]];
        let freeText = (typeof todayData === 'string') ? todayData : (todayData?.freeText || "");
        container.innerText = freeText.trim() !== "" ? freeText : "אין שידורים מתוכננים להיום. מוזיקה מעולה ברצף 24/7!";
    }
});

// Parties Logic - Horizontal Cards
db.collection('settings').doc('parties_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data();
        const container = document.getElementById('party-container');
        container.innerHTML = "";
        
        Object.keys(data).sort().forEach(key => {
            const p = data[key];
            if(p && p.title) {
                const imageUrl = p.image || p.imageUrl || "";
                container.innerHTML += `
                    <div class="party-card">
                        ${imageUrl ? `
                        <div class="party-image-container">
                            <img src="${imageUrl}" class="party-card-img-blur">
                            <img src="${imageUrl}" class="party-card-img" alt="${p.title}">
                        </div>` : ''}
                        <div class="party-content">
                            <div class="party-date-tag">${p.date || 'בקרוב'}</div>
                            <h3 style="margin-bottom: 10px; font-size: 1.6rem; font-weight: 900; color: #fff;">${p.title}</h3>
                            <div style="font-size:16px; color:var(--primary); margin-bottom:15px; font-weight: 700;">${p.freeText || ''}</div>
                            <p style="opacity:0.8; font-size:15px; line-height: 1.6; margin-bottom: 25px; flex-grow: 1;">${p.desc || ''}</p>
                            <div style="margin-top: auto;">
                                ${p.link ? `<a href="${p.link}" target="_blank" class="submit-btn" style="display:block; text-decoration:none; text-align:center; max-width: 200px; margin-right: auto;">פרטים וכרטיסים</a>` : ''}
                            </div>
                        </div>
                    </div>`;
            }
        });
        if (!container.innerHTML) container.innerHTML = `<div style="text-align:center; opacity:0.5; padding: 40px;">אין אירועים רשומים כרגע.</div>`;
    }
});

async function sendGreeting(event) {
    const n = document.getElementById('msg-name').value, c = document.getElementById('msg-content').value;
    if(!n || !c) return;
    const btn = event.target; btn.innerText = "שולח..."; btn.disabled = true;
    try {
        await fetch(`https://api.telegram.org/bot8414933459:AAGpn4XZLJWPjN7v4gn2niSyIxMHWVV08kY/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: "-5069698792", text: `🎙️ ד"ש מ: ${n}\n${c}` })
        });
        btn.innerText = "נשלח!"; document.getElementById('msg-content').value = "";
        setTimeout(() => { btn.innerText = "שלח הודעה"; btn.disabled = false; }, 3000);
    } catch(e) { btn.innerText = "שגיאה"; setTimeout(() => { btn.innerText = "שלח הודעה"; btn.disabled = false; }, 3000); }
}
</script>
</body>
</html>
