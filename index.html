<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רדיו מדברים בדסמ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
.cstrEmbed a{display:none !important;}
body{
  font-family:'Heebo',sans-serif;
  background:#0a0a0a;
  color:#fff;
  overflow-x:hidden;
  direction:rtl;
}

/* ── NAV ── */
.nav-wrap{
  position:fixed;top:24px;left:0;right:0;
  z-index:50;display:flex;justify-content:center;
  padding:0 16px;
}
.nav{
  max-width:1100px;width:100%;
  background:rgba(20,20,20,0.96);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:24px;
  padding:12px 24px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}
.nav .logo{
  font-size:20px;font-weight:900;
  letter-spacing:-0.5px;color:#fff;text-decoration:none;
}
.nav .logo span{color:#e74c3c;}
.nav-links{display:flex;gap:32px;}
.nav-links a{
  color:#aaa;text-decoration:none;font-size:14px;
  font-weight:600;transition:0.3s;
  text-transform:uppercase;letter-spacing:1px;
}
.nav-links a:hover{color:#fff;}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:120px 24px 80px;
  background:radial-gradient(circle at 50% -20%, #221111 0%, #0a0a0a 70%);
}

.now-card{
  position:relative;z-index:10;
  width:100%;max-width:480px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:48px;
  padding:56px 40px;
  text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,0.6);
}

.avatar-wrap{
  position:relative;
  width:220px;height:220px;
  margin:0 auto 40px;
}
.avatar{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #1a1a1a;
  box-shadow:0 0 60px rgba(231,76,60,0.2);
  background:#000;
}
.status-tag{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:#e74c3c;color:#fff;
  font-size:11px;font-weight:900;
  padding:6px 16px;border-radius:20px;
  letter-spacing:1px;box-shadow:0 4px 15px rgba(231,76,60,0.4);
}

.dj-name{font-size:32px;font-weight:900;margin-bottom:8px;letter-spacing:-1px;}
.song-title{font-size:16px;color:#888;margin-bottom:40px;height:24px;overflow:hidden;}

/* ── PLAYER CONTROLS ── */
.controls{display:flex;align-items:center;justify-content:center;gap:32px;}
.play-btn{
  width:88px;height:88px;border-radius:50%;
  background:#e74c3c;border:none;color:#fff;font-size:32px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow:0 15px 40px rgba(231,76,60,0.3);
}
.play-btn:hover{transform:scale(1.1);background:#ff4d3a;box-shadow:0 20px 50px rgba(231,76,60,0.4);}

.fallback-player{display:none;margin-top:20px;text-align:center;}
.fallback-player.visible{display:block;}
.fallback-player audio{width:100%;max-width:300px;filter:invert(1);}

.autoplay-hint{
  font-size:12px;color:#e74c3c;margin-top:16px;
  animation:pulse 2s infinite;display:none;
}
@keyframes pulse{0%{opacity:0.5;}50%{opacity:1;}100%{opacity:0.5;}}

/* ── SECTIONS ── */
.section{padding:80px 24px;max-width:1100px;margin:0 auto;}
.section-title{font-size:36px;font-weight:900;margin-bottom:40px;text-align:center;}
.section-title span{color:#e74c3c;}

/* ── DASHIM (GREETINGS) ── */
.dash-container{
  max-width:600px;margin:0 auto;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:32px;padding:32px;
  backdrop-filter:blur(10px);
}
.dash-field{
  width:100%;background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:16px;color:#fff;
  font-family:inherit;font-size:16px;margin-bottom:16px;
  outline:none;transition:0.3s;
}
.dash-field:focus{border-color:#e74c3c;}
.dash-send{
  width:100%;background:#e74c3c;color:#fff;border:none;
  padding:16px;border-radius:16px;font-weight:800;
  cursor:pointer;transition:0.3s;
}
.dash-send:hover{background:#ff4d3a;transform:translateY(-2px);}

/* ── SCHEDULE ── */
.schedule-list{
  background:rgba(255,255,255,0.02);
  border-radius:32px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.05);
}
.schedule-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 32px;border-bottom:1px solid rgba(255,255,255,0.05);
}
.schedule-item:last-child{border-bottom:none;}
.schedule-item .time{color:#e74c3c;font-weight:800;font-size:18px;}
.schedule-item .desc{font-weight:400;color:#ccc;}

/* ── PARTIES ── */
.grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:32px;}
.card{background:#151515;border:1px solid rgba(255,255,255,0.05);border-radius:32px;padding:32px;transition:0.3s;}
.card:hover{border-color:rgba(231,76,60,0.3);transform:translateY(-10px);}
.card h3{margin-bottom:12px;color:#e74c3c;}
.card p{color:#888;line-height:1.6;}

footer{padding:60px 24px;text-align:center;border-top:1px solid rgba(255,255,255,0.05);color:#555;font-size:14px;}

@media (max-width:768px){
  .nav-links{display:none;}
  .now-card{padding:40px 24px;}
  .dj-name{font-size:28px;}
  .schedule-item{flex-direction:column;align-items:flex-start;gap:8px;}
}
</style>
</head>
<body>

<div class="nav-wrap">
  <nav class="nav">
    <a href="#" class="logo">רדיו <span>מדברים בדסמ</span></a>
    <div class="nav-links">
      <a href="#dashim">דשים</a>
      <a href="#schedule">לוח שידורים</a>
      <a href="#parties">מסיבות</a>
    </div>
  </nav>
</div>

<section class="hero">
  <div class="now-card">
    <div class="avatar-wrap">
      <img id="main-dj-image" src="https://via.placeholder.com/220" class="avatar" alt="DJ">
      <div class="status-tag">LIVE</div>
    </div>
    
    <h2 class="dj-name" id="dj-name">טוען...</h2>
    <p class="song-title" id="song-title">מתחבר לסטרים...</p>
    
    <div class="controls">
      <button class="play-btn" id="fb-play-btn" onclick="fbTogglePlay()">
        <i class="fas fa-play" id="fb-play-icon"></i>
      </button>
    </div>

    <div class="fallback-player" id="fallback-player">
      <audio id="fb-audio" src="https://morcast.caster.fm:13763/y4k1D" crossorigin="anonymous"></audio>
      <div class="autoplay-hint" id="fb-autoplay-hint">לחץ פליי לשמיעה</div>
    </div>
  </div>
</section>

<!-- סעיף דשים -->
<section id="dashim" class="section">
  <h2 class="section-title">שלחו לנו <span>דשים</span></h2>
  <div class="dash-container">
    <input type="text" id="dash-name" class="dash-field" placeholder="השם שלכם">
    <textarea id="dash-msg" class="dash-field" rows="3" placeholder="מה תרצו למסור?"></textarea>
    <button class="dash-send" onclick="sendDash()">שלח דרישת שלום</button>
  </div>
</section>

<!-- סעיף לוח שידורים -->
<section id="schedule" class="section">
  <h2 class="section-title">לוח <span>שידורים</span></h2>
  <div class="schedule-list" id="schedule-container">
    <div class="schedule-item">
      <span class="time">22:00 - 00:00</span>
      <span class="desc">שידור לילי מרכזי - מוזיקה ודיבורים</span>
    </div>
    <div class="schedule-item">
      <span class="time">00:00 - 02:00</span>
      <span class="desc">סט לילה חופשי</span>
    </div>
  </div>
</section>

<section id="parties" class="section">
  <h2 class="section-title">המסיבות <span>שלנו</span></h2>
  <div class="grid" id="parties-list-home"></div>
</section>

<footer>
  &copy; 2024 רדיו מדברים בדסמ. כל הזכויות שמורות.
</footer>

<script>
// לוגיקת נגן
var fbAudio = document.getElementById('fb-audio');
var fbPlaying = false;
var fallbackPlayer = document.getElementById('fallback-player');

function fbTogglePlay() { if(fbPlaying) fbPause(); else fbPlay(); }
function fbPlay() {
  fbAudio.play().then(() => {
    fbPlaying = true;
    document.getElementById('fb-play-icon').className = 'fas fa-pause';
  }).catch(e => { document.getElementById('fb-autoplay-hint').style.display = 'block'; });
}
function fbPause() {
  fbAudio.pause();
  fbPlaying = false;
  document.getElementById('fb-play-icon').className = 'fas fa-play';
}

async function fetchNow() {
  try {
    const res = await fetch('/api/nowplaying');
    const data = await res.json();
    if(data.online) {
      document.getElementById('dj-name').innerText = data.dj || 'שדרן רדיו';
      document.getElementById('song-title').innerText = data.title || '';
      fallbackPlayer.classList.add('visible');
    } else {
      document.getElementById('dj-name').innerText = 'רדיו לא פעיל';
      document.getElementById('song-title').innerText = 'נחזור בקרוב...';
    }
  } catch(e) {}
}

function reload() {
  var p = JSON.parse(localStorage.getItem('rdx_parties')) || [];
  var el = document.getElementById('parties-list-home');
  if(!el) return;
  if(!p.length) {
    el.innerHTML = '<div class="card"><h3>בקרוב...</h3><p>אין מסיבות כרגע.</p></div>';
    return;
  }
  el.innerHTML = p.map(i => `<div class="card"><h3>${i.name}</h3><p>${i.desc}</p></div>`).join('');
}

reload(); fetchNow();
setInterval(fetchNow, 30000); setInterval(reload, 8000);
</script>

<!-- Firebase Integration -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  const config = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
  };
  if (!firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.firestore();
  
  // סנכרון תמונת שדרן
  db.collection('settings').doc('dj_info').onSnapshot((doc) => {
    if (doc.exists && doc.data().image) {
      document.getElementById('main-dj-image').src = doc.data().image;
    }
  });

  // פונקציית שליחת דשים
  window.sendDash = function() {
    const name = document.getElementById('dash-name').value.trim();
    const msg = document.getElementById('dash-msg').value.trim();
    if(!name || !msg) { alert('נא למלא שם והודעה'); return; }

    db.collection('greetings').add({
      sender: name,
      text: msg,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      alert('דרישת השלום נשלחה בהצלחה!');
      document.getElementById('dash-name').value = '';
      document.getElementById('dash-msg').value = '';
    });
  };
})();
</script>
</body>
</html>
