<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רדיו מדברים בדסמ | הקול של הקהילה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #080808;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hero-bg {
            position: relative;
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(8,8,8,1)), 
                        url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            padding-top: 140px;
            z-index: 1;
        }

        header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 900; 
            font-size: 26px;
            color: #fff;
            text-decoration: none;
        }
        .logo-area span.highlight { color: var(--primary); }

        .nav-links { 
            display: flex; 
            gap: 25px; 
            list-style: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
            width: 100%;
            justify-content: center;
        }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 15px; 
            opacity: 0.7;
            transition: 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: var(--primary); }

        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 15px 30px 15px 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            min-width: 350px;
            z-index: 10;
        }

        .play-trigger {
            width: 70px;
            height: 70px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .play-trigger:active { transform: scale(0.95); }
        .play-trigger.is-playing { animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .track-info { text-align: right; flex: 1; }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            background: rgba(231, 76, 60, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
        .live-dot.offline { background: #888; }

        .now-on-air-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            width: 90%;
            max-width: 700px;
            margin: -60px auto 70px;
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
            z-index: 10;
        }
        .dj-thumb { width: 110px; height: 110px; border-radius: 20px; object-fit: cover; border: 2px solid var(--primary); }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr; 
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .box-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .schedule-time { color: var(--primary); font-weight: bold; width: 100px; }

        .party-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 20px;
        }
        .party-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
        }
        .party-img { width: 100%; height: 200px; object-fit: cover; }
        .party-content { padding: 20px; text-align: right; }

        @media (max-width: 768px) {
            .main-grid, .party-grid { grid-template-columns: 1fr; }
            .player-container { min-width: 90%; padding: 15px; }
            .now-on-air-card { flex-direction: column; text-align: center; }
            .nav-links { gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div>מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#dashim">ד"שים</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#parties">מסיבות</a>
    </nav>
</header>

<section class="hero-bg">
    <h1 style="font-size: clamp(32px, 8vw, 55px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
    <p style="opacity: 0.6; font-size: 18px;">שידור חי, מוזיקה ודיונים 24/7</p>

    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">בודק...</span>
            </div>
            <span id="status-text" style="font-size: 18px; font-weight: 700; display: block;">טוען נגן...</span>
        </div>
        
        <button class="play-trigger" id="master-play-btn" disabled>
            <i class="fa-solid fa-play" id="btn-icon"></i>
        </button>
    </div>

    <div style="display:none;">
        <div id="youtube-engine"></div>
        <audio id="audio-engine" preload="auto" crossorigin="anonymous" playsinline></audio>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=200" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 12px; margin-bottom: 5px;">בשידור כרגע</div>
        <h2 id="dj-name-display" style="font-size: 28px;">טוען...</h2>
        <p style="color: rgba(255,255,255,0.5);">רדיו מדברים בדסמ</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="dashim">
        <h2 style="margin-bottom: 25px; border-right: 4px solid var(--primary); padding-right: 15px;">שלח ד"ש</h2>
        <input type="text" id="msg-name" placeholder="שם המוסר" style="width:100%; padding:15px; margin-bottom:10px; background:#222; border:none; color:#fff; border-radius:10px;">
        <textarea id="msg-content" placeholder="הודעה לשדרן..." style="width:100%; padding:15px; background:#222; border:none; color:#fff; border-radius:10px; height:100px;"></textarea>
        <button onclick="sendGreeting()" style="width:100%; padding:15px; background:var(--primary); color:#fff; border:none; cursor:pointer; border-radius:10px; font-weight:bold; margin-top:10px;">שלח הודעה</button>
    </div>
    
    <div class="box-container" id="schedule">
        <h2 style="margin-bottom: 25px; border-right: 4px solid var(--primary); padding-right: 15px;">לוח שידורים - <span id="current-day-label"></span></h2>
        <div id="schedule-content">טוען לוח שידורים...</div>
    </div>
</div>

<div id="parties" style="padding: 0 20px; max-width: 1200px; margin: 0 auto 30px;">
    <h2 style="margin-bottom: 25px; border-right: 4px solid var(--primary); padding-right: 15px;">מסיבות קרובות</h2>
</div>
<div class="party-grid" id="party-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let ytPlayer, isYtReady = false, isPlaying = false, currentMode = 'none', pendingYtId = null;
const playBtn = document.getElementById('master-play-btn'), btnIcon = document.getElementById('btn-icon');
const audioEngine = document.getElementById('audio-engine'), statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text'), liveDot = document.getElementById('live-status-dot');

const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('youtube-engine', {
        height: '1', width: '1', videoId: '',
        playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
        events: {
            'onReady': () => { 
                isYtReady = true; 
                playBtn.disabled = false; 
                if(pendingYtId) loadYoutube(pendingYtId); 
            },
            'onStateChange': (e) => { 
                isPlaying = (e.data == YT.PlayerState.PLAYING); 
                updateUI(); 
            }
        }
    });
}

function updateUI() {
    btnIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    isPlaying ? playBtn.classList.add('is-playing') : playBtn.classList.remove('is-playing');
}

function loadYoutube(id) {
    currentMode = 'youtube';
    liveText.innerText = "שידור חי LIVE";
    liveDot.className = "live-dot";
    audioEngine.pause();
    if(isYtReady) ytPlayer.cueVideoById(id); else pendingYtId = id;
}

function switchToBackup() {
    currentMode = 'backup';
    liveText.innerText = "OFFLINE";
    liveDot.className = "live-dot offline";
    statusText.innerText = "מוזיקה ברצף";
    document.getElementById('dj-name-display').innerText = "מוזיקה ברצף";
    audioEngine.src = "https://stream.zeno.fm/0r0xa792kwzuv"; 
    audioEngine.load();
}

playBtn.addEventListener('click', () => {
    if (currentMode === 'youtube') {
        if (isPlaying) {
            ytPlayer.pauseVideo();
        } else {
            ytPlayer.playVideo();
        }
    } else {
        if (isPlaying) {
            audioEngine.pause();
            isPlaying = false;
        } else {
            const playPromise = audioEngine.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isPlaying = true;
                    updateUI();
                }).catch(error => {
                    console.log("Playback error:", error);
                });
            }
        }
    }
    updateUI();
});

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const d = doc.data();
        statusText.innerText = d.name || "בשידור";
        document.getElementById('dj-name-display').innerText = d.name || "בשידור";
        if(d.image) document.getElementById('dj-image-display').src = d.image;
        if(d.youtubeId && d.youtubeId.length > 5) {
            loadYoutube(d.youtubeId);
        } else {
            switchToBackup();
        }
    } else {
        switchToBackup();
    }
    playBtn.disabled = false;
}, error => console.error("DJ info snapshot error:", error));

const daysEng = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
db.collection('settings').doc('schedule').onSnapshot(doc => {
    if(doc.exists) {
        const s = doc.data();
        const today = daysEng[new Date().getDay()];
        document.getElementById('current-day-label').innerText = daysHeb[new Date().getDay()];
        const container = document.getElementById('schedule-content');
        
        // תיקון השגיאה: מוודא שהנתונים הם מערך לפני שימוש ב-map
        const todaySchedule = s[today];
        if (Array.isArray(todaySchedule)) {
            container.innerHTML = todaySchedule.map(item => item.title ? `<div class="schedule-item"><div class="schedule-time">שידור</div><div><b>${item.title}</b><br><small>${item.host || ''}</small></div></div>` : '').join('') || "מוזיקה ברצף";
        } else {
            container.innerHTML = "מוזיקה ברצף";
        }
    }
}, error => console.error("Schedule snapshot error:", error));

db.collection('settings').doc('parties_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data();
        const container = document.getElementById('party-container');
        container.innerHTML = "";
        ['party1', 'party2'].forEach(p => {
            if(data[p] && data[p].title) {
                container.innerHTML += `<div class="party-card"><img src="${data[p].img || ''}" class="party-img"><div class="party-content"><div style="color:var(--primary); font-weight:bold;">${data[p].date || ''}</div><h3>${data[p].title}</h3><p style="opacity:0.6; font-size:14px;">${data[p].desc || ''}</p></div></div>`;
            }
        });
    }
}, error => console.error("Parties snapshot error:", error));

async function sendGreeting() {
    const n = document.getElementById('msg-name').value, c = document.getElementById('msg-content').value;
    if(!n || !c) return;
    try {
        await fetch(`https://api.telegram.org/bot8414933459:AAGpn4XZLJWPjN7v4gn2niSyIxMHWVV08kY/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: "-5069698792", text: `🎙️ ד"ש מ: ${n}\n${c}` })
        });
        alert("נשלח בהצלחה!");
        document.getElementById('msg-content').value = "";
    } catch(e) {}
}

setTimeout(() => { 
    if(currentMode === 'none') switchToBackup(); 
    playBtn.disabled = false; 
}, 5000);
</script>
</body>
</html>
