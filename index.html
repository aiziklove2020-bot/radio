<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רדיו מדברים בדסמ | הקול של הקהילה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root {
    --primary: #e74c3c;
    --primary-dark: #c0392b;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --bg-dark: #080808;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Heebo', sans-serif;
    background-color: var(--bg-dark);
    color: #fff;
    line-height: 1.6;
    overflow-x: hidden;
}

/* ── Hero Background ── */
.hero-bg {
    position: relative;
    height: 80vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(8,8,8,1)), 
                url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

/* ── Fixed Header ── */
header {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 1200px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo-area { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-weight: 900; 
    font-size: clamp(18px, 4vw, 24px); 
    color: #fff;
    text-decoration: none;
}
.logo-area span.highlight { color: var(--primary); }

.nav-links { 
    display: flex; 
    gap: 25px; 
    list-style: none; 
}
.nav-links a { 
    color: #fff; 
    text-decoration: none; 
    font-weight: 500; 
    font-size: 16px;
    transition: 0.3s;
    opacity: 0.8;
}
.nav-links a:hover { opacity: 1; color: var(--primary); }

/* ── Unified Media Player ── */
.custom-player {
    margin-top: 30px;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 15px 30px;
    max-width: 500px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.play-pause-btn {
    background: var(--primary);
    color: white;
    border: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    flex-shrink: 0;
}
.play-pause-btn:hover { transform: scale(1.1); background: var(--primary-dark); }

.player-info {
    text-align: right;
    flex: 1;
}
.player-info .status-tag {
    font-size: 10px;
    background: rgba(231, 76, 60, 0.2);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 800;
    margin-bottom: 4px;
    display: inline-block;
}
.player-info .track-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.volume-control {
    display: flex;
    align-items: center;
    gap: 10px;
}
.volume-slider {
    width: 70px;
    cursor: pointer;
    accent-color: var(--primary);
}

/* ── On Air Card ── */
.now-on-air-card {
    background: rgba(25, 25, 25, 0.6);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 25px;
    padding: 25px;
    width: 90%;
    max-width: 700px;
    margin: -70px auto 70px;
    display: flex;
    align-items: center;
    gap: 25px;
    position: relative;
    z-index: 10;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}
.dj-thumb { width: 110px; height: 110px; border-radius: 20px; object-fit: cover; border: 2px solid var(--primary); }

.main-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto 80px;
    padding: 0 20px;
}

.box-container {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 35px;
}

.blink { animation: blinker 1.5s linear infinite; }
@keyframes blinker { 50% { opacity: 0.3; } }

@media (max-width: 768px) {
    .nav-links { gap: 15px; }
    .nav-links a { font-size: 14px; }
    .main-grid { grid-template-columns: 1fr; }
    .now-on-air-card { flex-direction: column; text-align: center; margin-top: -40px; }
}
</style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div>מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#home">בית</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#dashim">ד"שים</a>
    </nav>
</header>

<section class="hero-bg" id="home">
    <div style="max-width: 800px; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1 style="font-size: clamp(35px, 8vw, 65px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
        <p style="color: rgba(255,255,255,0.6); margin-top: 10px;">שידור חי ופלייליסט 24/7 בנגן אחד</p>
        
        <div class="custom-player">
            <button class="play-pause-btn" id="master-play-btn">
                <i class="fa-solid fa-play" id="btn-icon"></i>
            </button>
            <div class="player-info">
                <span class="status-tag" id="internal-status">מתחבר...</span>
                <span class="track-name" id="track-label">טוען נגן...</span>
            </div>
            <div class="volume-control">
                <i class="fa-solid fa-volume-low" style="color: rgba(255,255,255,0.3); font-size: 12px;"></i>
                <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" id="vol-slider">
            </div>
        </div>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div id="air-badge" style="color: var(--primary); font-weight: 800; font-size: 12px; margin-bottom: 5px;">בדיקת מערכת...</div>
        <h2 id="dj-name-display" style="font-size: 28px;">רדיו מדברים בדסמ</h2>
        <p id="song-name-display" style="color: rgba(255,255,255,0.5);">מיד נתחיל במוזיקה...</p>
    </div>
    <div id="live-indicator" style="display:none;" class="blink">
        <i class="fa-solid fa-signal" style="color: var(--primary); font-size: 20px;"></i>
    </div>
</div>

<audio id="audio-engine" preload="auto" crossorigin="anonymous"></audio>

<div class="main-grid">
    <div class="box-container" id="schedule">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">לוח שידורים</h2>
        <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px;">
            <div style="display:flex; justify-content:space-between; margin-bottom: 10px;">
                <span>שידורים חיים</span>
                <span style="color: var(--primary); font-weight: 800;">LIVE</span>
            </div>
            <p style="font-size: 13px; color: rgba(255,255,255,0.4);">ימי חול החל מ-22:00 בלילה</p>
        </div>
    </div>

    <div class="box-container" id="dashim">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">שלח ד"ש לשדרן</h2>
        <div style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" id="msg-name" placeholder="שם שלך" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff;">
            <textarea id="msg-content" placeholder="ההודעה שלך..." rows="3" style="width:100%; padding:15px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#fff; font-family:inherit;"></textarea>
            <button onclick="sendGreeting()" style="background:var(--primary); color:#fff; border:none; padding:15px; border-radius:12px; font-weight:900; cursor:pointer;">שלח מסר</button>
        </div>
    </div>
</div>

<footer style="padding: 60px; text-align: center; opacity: 0.2; font-size: 12px;">
    &copy; 2024 רדיו מדברים בדסמ | חוויה אחודה
</footer>

<script>
const CONFIG = {
    playlist: "https://archive.org/download/the-unforgiven-remasteredmp-3j.cc_20260321/The%20Unforgiven%20%28Remastered%29mp3j.cc.mp3",
    live: "https://shaincast.caster.fm:18126/listen.mp3"
};

const audio = document.getElementById('audio-engine');
const playBtn = document.getElementById('master-play-btn');
const btnIcon = document.getElementById('btn-icon');
const statusTag = document.getElementById('internal-status');
const trackLabel = document.getElementById('track-label');
const volSlider = document.getElementById('vol-slider');

let isPlaying = false;
let isLive = false;

// פונקציה לטעינת המקור הנכון
function loadMediaSource() {
    const target = isLive ? CONFIG.live : CONFIG.playlist;
    if(audio.src !== target) {
        audio.src = target;
        audio.load();
    }
}

// לוגיקת לחיצה - מטפלת בהפעלת הסקריפט
playBtn.addEventListener('click', () => {
    if (!isPlaying) {
        // אם אין מקור, נטען
        if(!audio.src) loadMediaSource();
        
        audio.play().then(() => {
            isPlaying = true;
            btnIcon.className = "fa-solid fa-pause";
        }).catch(err => {
            console.error("Playback failed, retrying load...", err);
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                btnIcon.className = "fa-solid fa-pause";
            });
        });
    } else {
        audio.pause();
        isPlaying = false;
        btnIcon.className = "fa-solid fa-play";
    }
});

volSlider.addEventListener('input', (e) => audio.volume = e.target.value);

async function checkServerStatus() {
    const api = `https://api.caster.fm/query.php?publicToken=60e730b1-7eca-48ab-92da-977474cf4482&t=${Date.now()}`;
    try {
        const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(api)}`);
        const json = await res.json();
        const data = JSON.parse(json.contents);
        
        const statusChanged = (isLive !== (data.status === 'online'));
        isLive = (data.status === 'online');

        if(isLive) {
            statusTag.innerText = "שידור חי";
            trackLabel.innerText = data.dj_name || "שדרן באוויר";
            document.getElementById('air-badge').innerText = "LIVE ON AIR";
            document.getElementById('live-indicator').style.display = 'block';
            document.getElementById('dj-name-display').innerText = data.dj_name || "שדרן אורח";
            document.getElementById('song-name-display').innerText = data.song_title || "מנגנים עכשיו";
        } else {
            statusTag.innerText = "רדיו מדברים בדסמ";
            trackLabel.innerText = "פלייליסט הקהילה";
            document.getElementById('air-badge').innerText = "שידור אוטומטי";
            document.getElementById('live-indicator').style.display = 'none';
            document.getElementById('dj-name-display').innerText = "Auto DJ";
            document.getElementById('song-name-display').innerText = "מוזיקה ברצף 24/7";
        }

        // אם המצב השתנה בזמן נגינה - נחליף מקור בזמן אמת
        if(statusChanged && isPlaying) {
            loadMediaSource();
            audio.play();
        }
    } catch(e) {
        if(!audio.src) loadMediaSource();
    }
}

// בדיקת מצב שרת כל 15 שניות
checkServerStatus();
setInterval(checkServerStatus, 15000);

// טיפול בשגיאות
audio.addEventListener('error', () => {
    console.error("Audio error detected");
    if(isPlaying) {
        audio.src = CONFIG.playlist; // חזרה לפלייליסט במקרה של קריסת שידור חי
        audio.load();
        audio.play();
    }
});
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists && doc.data().image) {
        document.getElementById('dj-image-display').src = doc.data().image;
    }
});

function sendGreeting() {
    const n = document.getElementById('msg-name').value.trim();
    const c = document.getElementById('msg-content').value.trim();
    if(!n || !c) return;
    db.collection('greetings').add({
        sender: n,
        text: c,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        document.getElementById('msg-content').value = "";
        alert("ד\"ש נשלח!");
    });
}
</script>

</body>
</html>
