<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רדיו מדברים בדס"מ | לוח שידורים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-dark: #c0392b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #080808;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        /* Hero & Header */
        .hero-bg {
            position: relative;
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(8,8,8,1)), 
                        url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            padding-top: 80px;
        }

        header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 900; 
            font-size: 20px;
            color: #fff;
            text-decoration: none;
            margin-bottom: 5px;
        }
        .logo-area .brand-red { color: var(--primary); }

        .nav-links { 
            display: flex; 
            gap: 15px; 
            list-style: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 5px;
            width: 100%;
            justify-content: center;
        }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 500; font-size: 13px; opacity: 0.7; }

        /* Player */
        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 15px 8px 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            min-width: 280px;
        }

        .play-trigger {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        .play-trigger.is-playing { animation: pulse-red 2s infinite; background: #fff; color: var(--primary); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        .track-info { text-align: right; flex: 1; }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 800;
            color: var(--primary);
            background: rgba(255, 71, 87, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
        .live-dot.offline { background: #555; }
        .live-dot.active { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* Now On Air */
        .now-on-air-card {
            background: rgba(25, 25, 25, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            width: 95%;
            max-width: 600px;
            margin: -25px auto 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            position: relative;
        }
        .dj-thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 2px solid var(--primary); background: #111; }

        /* Sections */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr; 
            gap: 15px;
            max-width: 1100px;
            margin: 0 auto 30px;
            padding: 0 15px;
        }

        .box-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
        }

        .free-text-schedule { font-size: 15px; line-height: 1.5; white-space: pre-wrap; color: rgba(255, 255, 255, 0.8); }

        /* Horizontal Party Cards */
        .party-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 900px;
            margin: 0 auto 50px;
            padding: 0 15px;
        }

        .party-row {
            background: rgba(30, 30, 30, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            overflow: hidden;
            height: 140px;
            transition: 0.3s;
        }

        .party-row:hover {
            background: rgba(45, 45, 45, 0.6);
            border-color: rgba(255, 71, 87, 0.4);
            transform: scale(1.01);
        }

        .party-row-img-wrap {
            width: 140px;
            min-width: 140px;
            height: 100%;
            position: relative;
            background: #000;
        }

        .party-row-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .party-row-content {
            padding: 12px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: right;
            overflow: hidden;
        }

        .party-row-title {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .party-row-date {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .party-row-desc {
            font-size: 13px;
            opacity: 0.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .party-row-btn {
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 800;
            align-self: flex-start;
        }

        /* Forms */
        input, textarea {
            width:100%; padding:10px; margin-bottom:8px; background:#1a1a1a; border:1px solid rgba(255,255,255,0.08); color:#fff; border-radius:10px; font-size:14px; text-align: right;
        }
        .submit-btn {
            width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer; font-size: 15px;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .party-row { height: auto; min-height: 120px; }
            .party-row-img-wrap { width: 100px; min-width: 100px; }
            .party-row-title { font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div><span>רדיו מדברים</span> <span class="brand-red">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#dashim">ד"שים</a>
        <a href="#schedule">שידורים</a>
        <a href="#parties">מסיבות</a>
    </nav>
</header>

<section class="hero-bg">
    <h1 style="font-size: 32px; font-weight: 900;">הקול של הקהילה</h1>
    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">מתחבר...</span>
            </div>
            <span id="status-text" style="font-size: 14px; font-weight: 700; display: block;">טוען נגן...</span>
        </div>
        <button class="play-trigger" id="master-play-btn"><i class="fa-solid fa-play" id="btn-icon"></i></button>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://via.placeholder.com/100" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 10px;">LIVE NOW</div>
        <h2 id="dj-name-display" style="font-size: 18px;">רדיו מדברים בדס"מ</h2>
        <p id="sub-status" style="color: rgba(255,255,255,0.4); font-size: 12px;">טוען נתונים...</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="dashim">
        <h3 style="margin-bottom: 12px; font-weight: 900; color: var(--primary);">שלח ד"ש</h3>
        <input type="text" id="msg-name" placeholder="השם שלך">
        <textarea id="msg-content" placeholder="ההודעה שלך..." style="height:80px;"></textarea>
        <button class="submit-btn" onclick="sendGreeting(event)">שלח ד"ש לשדרן</button>
    </div>
    
    <div class="box-container" id="schedule">
        <h3 style="margin-bottom: 12px; font-weight: 900; color: var(--primary);">לוח שידורים: <span id="current-day-label"></span></h3>
        <div id="schedule-content" class="free-text-schedule">טוען...</div>
    </div>
</div>

<div id="parties" style="padding: 0 15px; max-width: 900px; margin: 20px auto 10px; text-align: right;">
    <h3 style="font-weight: 900; color: var(--primary);">מסיבות ואירועים</h3>
</div>
<div class="party-list" id="party-container"></div>

<audio id="audio-engine" crossorigin="anonymous"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULT_STREAM = "https://stream.zeno.fm/0r0xa792kwzuv"; 
let isPlaying = false;
const playBtn = document.getElementById('master-play-btn'), btnIcon = document.getElementById('btn-icon');
const audioEngine = document.getElementById('audio-engine'), statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text'), liveDot = document.getElementById('live-status-dot');

async function togglePlay() {
    if (isPlaying) {
        audioEngine.pause(); audioEngine.src = ""; isPlaying = false;
    } else {
        statusText.innerText = "מתחבר...";
        const doc = await db.collection('settings').doc('dj_info').get();
        audioEngine.src = (doc.exists && doc.data().streamUrl) ? doc.data().streamUrl : DEFAULT_STREAM;
        try {
            await audioEngine.play(); 
            isPlaying = true;
            statusText.innerText = document.getElementById('dj-name-display').innerText;
        } catch(e) {
            statusText.innerText = "שגיאה בחיבור";
        }
    }
    btnIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    playBtn.classList.toggle('is-playing', isPlaying);
}
playBtn.addEventListener('click', togglePlay);

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const d = doc.data();
        const name = d.name || "";
        if(name.trim() !== "") {
            document.getElementById('dj-name-display').innerText = name;
            document.getElementById('sub-status').innerText = "שידור חי כרגע";
            if(d.image) document.getElementById('dj-image-display').src = d.image;
            liveText.innerText = "LIVE"; liveDot.className = "live-dot active";
        } else {
            document.getElementById('dj-name-display').innerText = "שידור אוטומטי";
            document.getElementById('sub-status').innerText = "מוזיקה ללא הפסקה";
            if(d.offlineImage) document.getElementById('dj-image-display').src = d.offlineImage;
            liveText.innerText = "OFFLINE"; liveDot.className = "live-dot offline";
        }
    }
});

const daysEng = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
const now = new Date();
document.getElementById('current-day-label').innerText = daysHeb[now.getDay()];

db.collection('settings').doc('schedule').onSnapshot(doc => {
    if(doc.exists) {
        const todayData = doc.data()[daysEng[now.getDay()]];
        document.getElementById('schedule-content').innerText = (typeof todayData === 'string' ? todayData : todayData?.freeText) || "מוזיקה ברצף!";
    }
});

db.collection('settings').doc('parties_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data(), container = document.getElementById('party-container');
        container.innerHTML = "";
        Object.keys(data).sort().forEach(key => {
            const p = data[key];
            if(p && p.title) {
                container.innerHTML += `
                    <div class="party-row">
                        <div class="party-row-img-wrap">
                            <img src="${p.image || 'https://via.placeholder.com/140'}" class="party-row-img">
                        </div>
                        <div class="party-row-content">
                            <div class="party-row-date">${p.date || 'בקרוב'}</div>
                            <div class="party-row-title">${p.title}</div>
                            <div class="party-row-desc">${p.desc || p.freeText || ''}</div>
                            ${p.link ? `<a href="${p.link}" target="_blank" class="party-row-btn">פרטים נוספים</a>` : ''}
                        </div>
                    </div>`;
            }
        });
    }
});

async function sendGreeting(event) {
    const n = document.getElementById('msg-name').value, c = document.getElementById('msg-content').value;
    if(!n || !c) return;
    try {
        await fetch(`https://api.telegram.org/bot8414933459:AAGpn4XZLJWPjN7v4gn2niSyIxMHWVV08kY/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: "-5069698792", text: `🎙️ ד"ש מ: ${n}\n${c}` })
        });
        document.getElementById('msg-content').value = "";
        event.target.innerText = "נשלח בהצלחה!";
        setTimeout(() => { event.target.innerText = "שלח ד\"ש לשדרן"; }, 3000);
    } catch(e) {}
}
</script>
</body>
</html>
