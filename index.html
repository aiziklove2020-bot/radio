<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רדיו מדברים בדסמ | הקול של הקהילה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #080808;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        .hero-bg {
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(8,8,8,1)), 
                        url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            padding-top: 80px;
            z-index: 1;
        }

        header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 5px;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 900; 
            font-size: 22px;
            color: #fff;
            text-decoration: none;
        }
        .logo-area span.highlight { color: var(--primary); }

        .nav-links { 
            display: flex; 
            gap: 15px; 
            list-style: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 5px;
            width: 100%;
            justify-content: center;
        }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 14px; 
            opacity: 0.7;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px 10px 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            min-width: 320px;
            z-index: 10;
        }

        .play-trigger {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
        .play-trigger.is-playing { animation: pulse-red 2.5s infinite; background: #fff; color: var(--primary); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .track-info { text-align: right; flex: 1; }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 800;
            color: var(--primary);
            background: rgba(231, 76, 60, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
        .live-dot.offline { background: #555; }
        .live-dot.active { animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .now-on-air-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            margin: -30px auto 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        .dj-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); background: #111; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr; 
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 15px;
        }

        .box-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .schedule-time { color: var(--primary); font-weight: bold; width: 70px; font-size: 14px; }

        .party-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 15px;
        }
        .party-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
        }
        .party-img { width: 100%; height: 160px; object-fit: cover; background: #111; }
        .party-content { padding: 12px; text-align: right; }

        input, textarea {
            width:100%; padding:12px; margin-bottom:8px; background:#222; border:none; color:#fff; border-radius:8px; font-size:14px; text-align: right;
        }
        .submit-btn {
            width:100%; padding:12px; background:var(--primary); color:#fff; border:none; cursor:pointer; border-radius:8px; font-weight:bold; margin-top:5px;
        }

        @media (max-width: 768px) {
            .main-grid, .party-grid { grid-template-columns: 1fr; gap: 10px; }
            .player-container { min-width: 90%; }
            .hero-bg { height: 50vh; padding-top: 100px; }
            .now-on-air-card { margin-top: -20px; margin-bottom: 25px; }
        }
        #youtube-engine { position: absolute; top: -9999px; left: -9999px; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div> רדיו מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#dashim">ד"שים</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#parties">מסיבות</a>
    </nav>
</header>

<section class="hero-bg">
    <h1 style="font-size: clamp(26px, 6vw, 42px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
    <p style="opacity: 0.6; font-size: 15px;">שידור חי 24/7</p>

    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">מתחבר...</span>
            </div>
            <span id="status-text" style="font-size: 15px; font-weight: 700; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">טוען נגן...</span>
        </div>
        
        <button class="play-trigger" id="master-play-btn">
            <i class="fa-solid fa-play" id="btn-icon"></i>
        </button>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=200" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 11px;">בשידור כרגע</div>
        <h2 id="dj-name-display" style="font-size: 20px; margin-bottom: 2px;">רדיו מדברים</h2>
        <p id="sub-status" style="color: rgba(255,255,255,0.5); font-size: 13px;">טוען נתונים...</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="dashim">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">שלח ד"ש</h2>
        <input type="text" id="msg-name" placeholder="שם המוסר">
        <textarea id="msg-content" placeholder="הודעה לשדרן..." style="height:80px; resize: none;"></textarea>
        <button class="submit-btn" onclick="sendGreeting(event)">שלח הודעה</button>
    </div>
    
    <div class="box-container" id="schedule">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">לוח שידורים - <span id="current-day-label"></span></h2>
        <div id="schedule-content" style="font-size: 14px;">טוען לוח שידורים...</div>
    </div>
</div>

<div id="parties" style="padding: 0 15px; max-width: 1200px; margin: 0 auto 10px;">
    <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">מסיבות קרובות</h2>
</div>
<div class="party-grid" id="party-container"></div>

<div id="youtube-engine"></div>
<audio id="audio-engine" preload="none" crossorigin="anonymous" src="https://ice6.somafm.com/indiepop-128-mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let ytPlayer, isYtReady = false, isPlaying = false, currentMode = 'backup', youtubeId = "";
const playBtn = document.getElementById('master-play-btn'), btnIcon = document.getElementById('btn-icon');
const audioEngine = document.getElementById('audio-engine'), statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text'), liveDot = document.getElementById('live-status-dot');

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('youtube-engine', {
        height: '0', width: '0',
        playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
        events: {
            'onReady': () => { isYtReady = true; },
            'onStateChange': (e) => { 
                isPlaying = (e.data == YT.PlayerState.PLAYING);
                updateUI();
            },
            'onError': () => switchToBackup()
        }
    });
}

function updateUI() {
    btnIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    if (isPlaying) {
        playBtn.classList.add('is-playing');
        liveDot.classList.add('active');
    } else {
        playBtn.classList.remove('is-playing');
        liveDot.classList.remove('active');
    }
}

function switchToBackup() {
    currentMode = 'backup';
    statusText.innerText = "מוזיקה ברצף (גיבוי)";
    document.getElementById('dj-name-display').innerText = "שידור אוטומטי";
    document.getElementById('sub-status').innerText = "מוזיקה ללא הפסקה";
    liveText.innerText = "OFFLINE";
    liveDot.className = "live-dot offline";
    if (isYtReady && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
}

playBtn.addEventListener('click', function() {
    if (isPlaying) {
        audioEngine.pause();
        if (isYtReady && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        isPlaying = false;
    } else {
        if (currentMode === 'youtube' && youtubeId) {
            audioEngine.pause();
            if (isYtReady) {
                ytPlayer.loadVideoById(youtubeId);
                ytPlayer.playVideo();
            }
        } else {
            if (isYtReady && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            audioEngine.play();
        }
        isPlaying = true;
    }
    updateUI();
});

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const d = doc.data();
        youtubeId = d.youtubeId ? d.youtubeId.trim() : "";
        if(youtubeId.length > 5) {
            currentMode = 'youtube';
            statusText.innerText = d.name || "בשידור חי";
            document.getElementById('dj-name-display').innerText = d.name || "רדיו מדברים";
            document.getElementById('sub-status').innerText = "שידור חי כרגע";
            if(d.image) document.getElementById('dj-image-display').src = d.image;
            liveText.innerText = "LIVE";
            liveDot.className = "live-dot active";
            if(isYtReady) ytPlayer.cueVideoById(youtubeId);
        } else {
            switchToBackup();
        }
    }
});

const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
const daysEng = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
const now = new Date();
document.getElementById('current-day-label').innerText = daysHeb[now.getDay()];

db.collection('settings').doc('schedule').onSnapshot(doc => {
    if(doc.exists) {
        const s = doc.data()[daysEng[now.getDay()]] || [];
        const container = document.getElementById('schedule-content');
        container.innerHTML = s.length ? s.map(i => `<div class="schedule-item"><div class="schedule-time">שידור</div><div><b>${i.title}</b><br><small>${i.host || ''}</small></div></div>`).join('') : "מוזיקה ברצף";
    }
});

db.collection('settings').doc('parties_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data();
        const container = document.getElementById('party-container');
        container.innerHTML = "";
        ['party1', 'party2'].forEach(p => {
            if(data[p] && data[p].title) {
                container.innerHTML += `<div class="party-card"><img src="${data[p].img || 'https://images.unsplash.com/photo-1514525253361-bee8a4874a73?auto=format&fit=crop&w=400'}" class="party-img"><div class="party-content"><div style="color:var(--primary); font-weight:bold; font-size:12px;">${data[p].date || ''}</div><h3>${data[p].title}</h3><p style="opacity:0.6; font-size:12px;">${data[p].desc || ''}</p></div></div>`;
            }
        });
    }
});

async function sendGreeting(event) {
    const n = document.getElementById('msg-name').value, c = document.getElementById('msg-content').value;
    if(!n || !c) return;
    const btn = event.target; btn.innerText = "שולח..."; btn.disabled = true;
    try {
        await fetch(`https://api.telegram.org/bot8414933459:AAGpn4XZLJWPjN7v4gn2niSyIxMHWVV08kY/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: "-5069698792", text: `🎙️ ד"ש מ: ${n}\n${c}` })
        });
        btn.innerText = "נשלח!"; document.getElementById('msg-content').value = "";
        setTimeout(() => { btn.innerText = "שלח הודעה"; btn.disabled = false; }, 3000);
    } catch(e) { btn.innerText = "שגיאה"; setTimeout(() => { btn.innerText = "שלח הודעה"; btn.disabled = false; }, 3000); }
}

audioEngine.addEventListener('playing', () => { isPlaying = true; updateUI(); });
audioEngine.addEventListener('pause', () => { if(currentMode === 'backup') { isPlaying = false; updateUI(); } });
</script>
</body>
</html>
