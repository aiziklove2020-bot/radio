<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>רדיו מדברים בדסמ | הקול של הקהילה</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e74c3c;
            --primary-dark: #c0392b;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-dark: #080808;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            line-height: 1.4;
            overflow-x: hidden;
        }

        .hero-bg {
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(8,8,8,1)), 
                        url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            padding-top: 80px;
            z-index: 1;
        }

        header {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 800px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 8px 15px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 5px;
            z-index: 1000;
        }

        .logo-area { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 900; 
            font-size: 22px;
            color: #fff;
            text-decoration: none;
        }
        .logo-area span.highlight { color: var(--primary); }

        .nav-links { 
            display: flex; 
            gap: 15px; 
            list-style: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 5px;
            width: 100%;
            justify-content: center;
        }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 14px; 
            opacity: 0.7;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 20px 10px 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            min-width: 320px;
            z-index: 10;
        }

        .play-trigger {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
        .play-trigger:active { transform: scale(0.9); }
        .play-trigger.is-playing { animation: pulse-red 2.5s infinite; background: #fff; color: var(--primary); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .track-info { text-align: right; flex: 1; }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 800;
            color: var(--primary);
            background: rgba(231, 76, 60, 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
        .live-dot.offline { background: #555; }
        .live-dot.active { animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        .now-on-air-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            width: 95%;
            max-width: 700px;
            margin: -30px auto 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            z-index: 10;
        }
        .dj-thumb { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid var(--primary); }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr; 
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 30px;
            padding: 0 15px;
        }

        .box-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .schedule-time { color: var(--primary); font-weight: bold; width: 70px; font-size: 14px; }

        .party-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 15px;
        }
        .party-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            overflow: hidden;
        }
        .party-img { width: 100%; height: 160px; object-fit: cover; }
        .party-content { padding: 12px; text-align: right; }

        h2 { font-size: 20px; margin-bottom: 15px; }

        @media (max-width: 768px) {
            .main-grid, .party-grid { grid-template-columns: 1fr; gap: 10px; }
            .player-container { min-width: 90%; }
            .hero-bg { height: 50vh; padding-top: 100px; }
            .now-on-air-card { margin-top: -20px; margin-bottom: 25px; }
            .party-img { height: 180px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div>מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#dashim">ד"שים</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#parties">מסיבות</a>
    </nav>
</header>

<section class="hero-bg">
    <h1 style="font-size: clamp(26px, 6vw, 42px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
    <p style="opacity: 0.6; font-size: 15px;">שידור חי 24/7</p>

    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">מתחבר...</span>
            </div>
            <span id="status-text" style="font-size: 15px; font-weight: 700; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">מוזיקה בטעינה...</span>
        </div>
        
        <button class="play-trigger" id="master-play-btn">
            <i class="fa-solid fa-play" id="btn-icon"></i>
        </button>
    </div>

    <div style="display:none; visibility: hidden; height: 0; width: 0;">
        <div id="youtube-engine"></div>
        <audio id="audio-engine" preload="auto" crossorigin="anonymous" playsinline src="https://icecast.walmradio.com:8000/rock"></audio>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=200" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 11px;">בשידור כרגע</div>
        <h2 id="dj-name-display" style="font-size: 20px; margin-bottom: 2px;">רדיו מדברים</h2>
        <p id="sub-status" style="color: rgba(255,255,255,0.5); font-size: 13px;">טוען נתונים...</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="dashim">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">שלח ד"ש</h2>
        <input type="text" id="msg-name" placeholder="שם המוסר" style="width:100%; padding:12px; margin-bottom:8px; background:#222; border:none; color:#fff; border-radius:8px; font-size:14px;">
        <textarea id="msg-content" placeholder="הודעה לשדרן..." style="width:100%; padding:12px; background:#222; border:none; color:#fff; border-radius:8px; height:80px; font-size:14px; resize: none;"></textarea>
        <button onclick="sendGreeting()" style="width:100%; padding:12px; background:var(--primary); color:#fff; border:none; cursor:pointer; border-radius:8px; font-weight:bold; margin-top:5px;">שלח הודעה</button>
    </div>
    
    <div class="box-container" id="schedule">
        <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">לוח שידורים - <span id="current-day-label"></span></h2>
        <div id="schedule-content" style="font-size: 14px;">טוען לוח שידורים...</div>
    </div>
</div>

<div id="parties" style="padding: 0 15px; max-width: 1200px; margin: 0 auto 10px;">
    <h2 style="border-right: 3px solid var(--primary); padding-right: 10px;">מסיבות קרובות</h2>
</div>
<div class="party-grid" id="party-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let ytPlayer, isYtReady = false, isPlaying = false, currentMode = 'backup', pendingYtId = null;
const playBtn = document.getElementById('master-play-btn'), btnIcon = document.getElementById('btn-icon');
const audioEngine = document.getElementById('audio-engine'), statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text'), liveDot = document.getElementById('live-status-dot');

const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// פונקציית עזר לעדכון ה-UI
function updateUI() {
    btnIcon.className = isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play";
    if (isPlaying) {
        playBtn.classList.add('is-playing');
        liveDot.classList.add('active');
    } else {
        playBtn.classList.remove('is-playing');
        liveDot.classList.remove('active');
    }
}

// יוטיוב
function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('youtube-engine', {
        height: '0', width: '0', videoId: '',
        playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
        events: {
            'onReady': () => { 
                isYtReady = true; 
                if(pendingYtId) loadYoutube(pendingYtId); 
            },
            'onStateChange': (e) => { 
                isPlaying = (e.data == YT.PlayerState.PLAYING); 
                updateUI(); 
            },
            'onError': () => switchToBackup()
        }
    });
}

function loadYoutube(id) {
    if (currentMode !== 'youtube' || pendingYtId !== id) {
        currentMode = 'youtube';
        pendingYtId = id;
        liveText.innerText = "שידור חי LIVE";
        liveDot.className = "live-dot";
        audioEngine.pause();
        if(isYtReady && ytPlayer && ytPlayer.loadVideoById) {
            ytPlayer.loadVideoById(id);
            if(isPlaying) ytPlayer.playVideo();
        }
    }
}

function switchToBackup() {
    if (currentMode !== 'backup') {
        currentMode = 'backup';
        pendingYtId = null;
        liveText.innerText = "גיבוי אופליין";
        liveDot.className = "live-dot offline";
        statusText.innerText = "מוזיקת רוק";
        document.getElementById('dj-name-display').innerText = "מוזיקת גיבוי";
        document.getElementById('sub-status').innerText = "שידור חי יחזור בקרוב";
        if (isYtReady && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        if(isPlaying) {
            audioEngine.play().catch(e => console.log("Audio Playback error"));
        }
    }
}

// טיפול בלחיצה
playBtn.addEventListener('click', function() {
    if (currentMode === 'youtube' && isYtReady) {
        if (isPlaying) {
            ytPlayer.pauseVideo();
            isPlaying = false;
        } else {
            ytPlayer.playVideo();
            isPlaying = true;
        }
    } else {
        // מצב אודיו גיבוי
        if (isPlaying) {
            audioEngine.pause();
            isPlaying = false;
        } else {
            // וודא שיש מקור (Source)
            if (!audioEngine.src) audioEngine.src = "https://icecast.walmradio.com:8000/rock";
            
            const playPromise = audioEngine.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updateUI();
                }).catch(error => {
                    console.error("Playback failed:", error);
                    // ניסיון איפוס וטעינה מחדש
                    audioEngine.load();
                    audioEngine.play().then(() => {
                        isPlaying = true;
                        updateUI();
                    });
                });
            }
        }
    }
    updateUI();
});

// Firebase Listeners
db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const d = doc.data();
        if(d.youtubeId && d.youtubeId.trim().length > 5) {
            statusText.innerText = d.name || "בשידור חי";
            document.getElementById('dj-name-display').innerText = d.name || "בשידור";
            document.getElementById('sub-status').innerText = "רדיו מדברים בדסמ";
            if(d.image) document.getElementById('dj-image-display').src = d.image;
            loadYoutube(d.youtubeId.trim());
        } else {
            switchToBackup();
        }
    } else {
        switchToBackup();
    }
});

const daysEng = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];
const daysHeb = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];

db.collection('settings').doc('schedule').onSnapshot(doc => {
    if(doc.exists) {
        const s = doc.data();
        const d = new Date();
        const today = daysEng[d.getDay()];
        document.getElementById('current-day-label').innerText = daysHeb[d.getDay()];
        const container = document.getElementById('schedule-content');
        const todaySchedule = s[today];
        if (Array.isArray(todaySchedule) && todaySchedule.length > 0) {
            container.innerHTML = todaySchedule.map(item => item.title ? `<div class="schedule-item"><div class="schedule-time">שידור</div><div><b>${item.title}</b><br><small>${item.host || ''}</small></div></div>` : '').join('');
        } else {
            container.innerHTML = "<div style='opacity:0.5; padding:10px;'>מוזיקה ברצף ללא הפסקה</div>";
        }
    }
});

db.collection('settings').doc('parties_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data();
        const container = document.getElementById('party-container');
        container.innerHTML = "";
        ['party1', 'party2'].forEach(p => {
            if(data[p] && data[p].title) {
                container.innerHTML += `
                    <div class="party-card">
                        <img src="${data[p].img || 'https://images.unsplash.com/photo-1514525253361-bee8a4874a73?auto=format&fit=crop&w=400'}" class="party-img">
                        <div class="party-content">
                            <div style="color:var(--primary); font-weight:bold; font-size:12px;">${data[p].date || ''}</div>
                            <h3 style="font-size:16px;">${data[p].title}</h3>
                            <p style="opacity:0.6; font-size:12px;">${data[p].desc || ''}</p>
                        </div>
                    </div>`;
            }
        });
    }
});

async function sendGreeting() {
    const n = document.getElementById('msg-name').value, c = document.getElementById('msg-content').value;
    if(!n || !c) return;
    try {
        const btn = event.target;
        btn.innerText = "שולח...";
        btn.disabled = true;
        
        await fetch(`https://api.telegram.org/bot8414933459:AAGpn4XZLJWPjN7v4gn2niSyIxMHWVV08kY/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: "-5069698792", text: `🎙️ ד"ש מ: ${n}\n${c}` })
        });
        
        btn.innerText = "נשלח בהצלחה!";
        btn.style.background = "#27ae60";
        document.getElementById('msg-content').value = "";
        
        setTimeout(() => {
            btn.innerText = "שלח הודעה";
            btn.style.background = "var(--primary)";
            btn.disabled = false;
        }, 3000);
    } catch(e) {
        alert("שגיאה בשליחה. נסה שוב.");
    }
}

// אתחול דף
window.addEventListener('load', () => {
    statusText.innerText = "בודק שידור...";
    // אם תוך 4 שניות שום דבר לא קרה - עבור לגיבוי
    setTimeout(() => {
        if(currentMode === 'backup' && !isPlaying) {
            statusText.innerText = "מוזיקת רוק (גיבוי)";
            liveText.innerText = "OFFLINE";
        }
    }, 4000);
});
</script>
</body>
</html>
