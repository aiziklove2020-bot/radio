<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רדיו מדברים בדסמ | הקול של הקהילה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root {
    --primary: #e74c3c;
    --primary-dark: #c0392b;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --bg-dark: #080808;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Heebo', sans-serif;
    background-color: var(--bg-dark);
    color: #fff;
    line-height: 1.6;
    overflow-x: hidden;
}

/* ── Hero Background ── */
.hero-bg {
    position: relative;
    height: 80vh;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(8,8,8,1)), 
                url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

/* ── Fixed Header ── */
header {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 1200px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo-area { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-weight: 900; 
    font-size: clamp(18px, 4vw, 24px); 
    color: #fff;
    text-decoration: none;
}
.logo-area span.highlight { color: var(--primary); }

.nav-links { 
    display: flex; 
    gap: 25px; 
    list-style: none; 
}
.nav-links a { 
    color: #fff; 
    text-decoration: none; 
    font-weight: 500; 
    font-size: 16px;
    transition: 0.3s;
    opacity: 0.8;
}
.nav-links a:hover { opacity: 1; color: var(--primary); }

/* ── Unified Media Player ── */
.custom-player {
    margin-top: 30px;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 15px 30px;
    max-width: 500px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.play-pause-btn {
    background: var(--primary);
    color: white;
    border: none;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    flex-shrink: 0;
}
.play-pause-btn:hover { transform: scale(1.1); background: var(--primary-dark); }

.player-info {
    text-align: right;
    flex: 1;
}
.player-info .status-tag {
    font-size: 10px;
    background: rgba(231, 76, 60, 0.2);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 5px;
    font-weight: 800;
    margin-bottom: 4px;
    display: inline-block;
}
.player-info .track-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.volume-control {
    display: flex;
    align-items: center;
    gap: 10px;
}
.volume-slider {
    width: 70px;
    cursor: pointer;
    accent-color: var(--primary);
}

/* ── On Air Card ── */
.now-on-air-card {
    background: rgba(25, 25, 25, 0.6);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 25px;
    padding: 25px;
    width: 90%;
    max-width: 700px;
    margin: -70px auto 70px;
    display: flex;
    align-items: center;
    gap: 25px;
    position: relative;
    z-index: 10;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}
.dj-thumb { width: 110px; height: 110px; border-radius: 20px; object-fit: cover; border: 2px solid var(--primary); }

.main-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto 80px;
    padding: 0 20px;
}

.box-container {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 35px;
}

@media (max-width: 768px) {
    .nav-links { gap: 15px; }
    .nav-links a { font-size: 14px; }
    .main-grid { grid-template-columns: 1fr; }
    .now-on-air-card { flex-direction: column; text-align: center; margin-top: -40px; }
}
</style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div>מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#home">בית</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#dashim">ד"שים</a>
    </nav>
</header>

<section class="hero-bg" id="home">
    <div style="max-width: 800px; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <h1 style="font-size: clamp(35px, 8vw, 65px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
        
        <div class="custom-player">
            <button class="play-pause-btn" id="master-play-btn">
                <i class="fa-solid fa-play" id="btn-icon"></i>
            </button>
            <div class="player-info">
                <span class="status-tag" id="internal-status">מוכן לנגינה</span>
                <span class="track-name" id="track-label">Metallica - Unforgiven</span>
            </div>
            <div class="volume-control">
                <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="1" id="vol-slider">
            </div>
        </div>

        <!-- נגן גיבוי נסתר למחצה -->
        <div style="margin-top:20px;">
            <audio id="audio-engine" controls style="height:35px; border-radius:10px; width:280px;"></audio>
            <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:5px;">אם הכפתור למעלה לא מגיב, השתמש בנגן הגיבוי כאן</p>
        </div>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div id="air-badge" style="color: var(--primary); font-weight: 800; font-size: 12px; margin-bottom: 5px;">מצב שידור</div>
        <h2 id="dj-name-display" style="font-size: 28px;">רדיו מדברים בדסמ</h2>
        <p id="song-name-display" style="color: rgba(255,255,255,0.5);">שידור פלייליסט פעיל</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="schedule">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">לוח שידורים</h2>
        <p>שידורי מוזיקה ופלייליסט 24/7.</p>
    </div>
    <div class="box-container" id="dashim">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">שלח ד"ש</h2>
        <input type="text" id="msg-name" placeholder="שם" style="width:100%; padding:10px; margin-bottom:10px; background:#222; border:1px solid #333; color:#fff;">
        <textarea id="msg-content" placeholder="הודעה" style="width:100%; padding:10px; background:#222; border:1px solid #333; color:#fff;"></textarea>
        <button onclick="sendGreeting()" style="width:100%; padding:10px; background:var(--primary); color:#fff; border:none; cursor:pointer;">שלח</button>
    </div>
</div>

<script>
// הכתובת הישירה ביותר לקובץ ה-MP3 מתוך ה-Archive
const AUDIO_URL = "https://archive.org/download/the-unforgiven-remasteredmp-3j.cc_20260321/The%20Unforgiven%20%28Remastered%29mp3j.cc.mp3";

const audio = document.getElementById('audio-engine');
const playBtn = document.getElementById('master-play-btn');
const btnIcon = document.getElementById('btn-icon');
const statusTag = document.getElementById('internal-status');

// הגדרה ראשונית
audio.src = AUDIO_URL;

function togglePlay() {
    if (audio.paused) {
        statusTag.innerText = "מתחבר...";
        audio.play().then(() => {
            isPlaying = true;
            btnIcon.className = "fa-solid fa-pause";
            statusTag.innerText = "מנגן כעת";
        }).catch(err => {
            console.error("Play failed:", err);
            statusTag.innerText = "שגיאת טעינה";
        });
    } else {
        audio.pause();
        btnIcon.className = "fa-solid fa-play";
        statusTag.innerText = "מושהה";
    }
}

playBtn.addEventListener('click', togglePlay);

// סנכרון בין נגן הגיבוי לכפתור המעוצב
audio.onplay = () => {
    btnIcon.className = "fa-solid fa-pause";
    statusTag.innerText = "מנגן כעת";
};
audio.onpause = () => {
    btnIcon.className = "fa-solid fa-play";
    statusTag.innerText = "מושהה";
};

document.getElementById('vol-slider').addEventListener('input', (e) => {
    audio.volume = e.target.value;
});
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists && doc.data().image) {
        document.getElementById('dj-image-display').src = doc.data().image;
    }
});

function sendGreeting() {
    const n = document.getElementById('msg-name').value.trim();
    const c = document.getElementById('msg-content').value.trim();
    if(!n || !c) return;
    db.collection('greetings').add({
        sender: n,
        text: c,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        document.getElementById('msg-content').value = "";
        alert("נשלח!");
    });
}
</script>
</body>
</html>
