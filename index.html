<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רדיו מדברים בדסמ | הקול של הקהילה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100;300;400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root {
    --primary: #e74c3c;
    --primary-dark: #c0392b;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --bg-dark: #080808;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Heebo', sans-serif;
    background-color: var(--bg-dark);
    color: #fff;
    line-height: 1.6;
    overflow-x: hidden;
}

/* ── Hero Background ── */
.hero-bg {
    position: relative;
    height: 80vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(8,8,8,1)), 
                url('https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}

/* ── Fixed Header ── */
header {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 1200px;
    background: rgba(20, 20, 20, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo-area { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    font-weight: 900; 
    font-size: clamp(18px, 4vw, 24px); 
    color: #fff;
    text-decoration: none;
}
.logo-area span.highlight { color: var(--primary); }

.nav-links { 
    display: flex; 
    gap: 25px; 
    list-style: none; 
}
.nav-links a { 
    color: #fff; 
    text-decoration: none; 
    font-weight: 500; 
    font-size: 16px;
    transition: 0.3s;
    opacity: 0.8;
}
.nav-links a:hover { opacity: 1; color: var(--primary); }

/* ── Hidden Engines ── */
.hidden-engines {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
}

/* ── Custom Styled Player UI ── */
.player-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 100px;
    padding: 12px 30px 12px 15px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 30px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    min-width: 320px;
}

.play-trigger {
    width: 65px;
    height: 65px;
    background: var(--primary);
    border-radius: 50%;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    box-shadow: 0 0 0 rgba(231, 76, 60, 0.4);
}
.play-trigger:hover { transform: scale(1.08); background: var(--primary-dark); }
.play-trigger:disabled { opacity: 0.5; cursor: wait; }

.play-trigger.is-playing {
    animation: pulse-red 2s infinite;
}

@keyframes pulse-red {
    0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
    100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
}

.track-info {
    text-align: right;
    flex: 1;
}
.live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    color: var(--primary);
    background: rgba(231, 76, 60, 0.15);
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
}
.live-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
.live-dot.offline { background: #888; }

.track-title {
    font-size: 18px;
    font-weight: 700;
    display: block;
}

/* ── On Air Card ── */
.now-on-air-card {
    background: rgba(25, 25, 25, 0.6);
    backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border);
    border-radius: 25px;
    padding: 25px;
    width: 90%;
    max-width: 700px;
    margin: -60px auto 70px;
    display: flex;
    align-items: center;
    gap: 25px;
    position: relative;
    z-index: 10;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}
.dj-thumb { width: 110px; height: 110px; border-radius: 20px; object-fit: cover; border: 2px solid var(--primary); }

.main-grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto 80px;
    padding: 0 20px;
}

.box-container {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    padding: 35px;
}

@media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
    .now-on-air-card { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<header>
    <a href="#" class="logo-area">
        <i class="fa-solid fa-microphone-lines" style="color: var(--primary);"></i>
        <div>מדברים <span class="highlight">בדס"מ</span></div>
    </a>
    <nav class="nav-links">
        <a href="#home">בית</a>
        <a href="#schedule">לוח שידורים</a>
        <a href="#dashim">ד"שים</a>
    </nav>
</header>

<section class="hero-bg" id="home">
    <h1 style="font-size: clamp(35px, 8vw, 60px); font-weight: 900; letter-spacing: -1px;">הקול של הקהילה</h1>
    <p style="opacity: 0.6; margin-top: 10px;">שידור חי, מוזיקה ודיונים - הכל במקום אחד.</p>

    <div class="player-container">
        <div class="track-info">
            <div class="live-indicator" id="live-indicator-box">
                <div class="live-dot" id="live-status-dot"></div>
                <span id="live-status-text">בודק שידור...</span>
            </div>
            <span class="track-title" id="status-text">טוען נגן...</span>
        </div>
        
        <button class="play-trigger" id="master-play-btn" disabled>
            <i class="fa-solid fa-play" id="btn-icon"></i>
        </button>
    </div>

    <!-- נגנים מוסתרים -->
    <div class="hidden-engines">
        <div id="youtube-engine"></div>
        <!-- נגן הגיבוי מ-Archive.org -->
        <iframe id="backup-engine" src="https://archive.org/embed/the-unforgiven-remasteredmp-3j.cc_20260321" allow="autoplay"></iframe>
    </div>
</section>

<div class="now-on-air-card">
    <img id="dj-image-display" src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop" class="dj-thumb">
    <div style="flex:1; text-align: right;">
        <div style="color: var(--primary); font-weight: 800; font-size: 12px; margin-bottom: 5px;">סטטוס שידור</div>
        <h2 id="dj-name-display" style="font-size: 28px;">רדיו מדברים בדסמ</h2>
        <p id="song-name-display" style="color: rgba(255,255,255,0.5);">מחוברים למערכת השידור</p>
    </div>
</div>

<div class="main-grid">
    <div class="box-container" id="schedule">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">לוח שידורים</h2>
        <p>כשאנחנו לא בשידור חי, תוכלו ליהנות ממוזיקה שנבחרה עבורכם מתוך הארכיון שלנו.</p>
    </div>
    <div class="box-container" id="dashim">
        <h2 style="border-right: 4px solid var(--primary); padding-right: 15px; margin-bottom: 25px;">שלח ד"ש</h2>
        <input type="text" id="msg-name" placeholder="שם המוסר" style="width:100%; padding:12px; margin-bottom:10px; background:#222; border:1px solid #333; color:#fff; border-radius:10px;">
        <textarea id="msg-content" placeholder="הודעה לשדרן..." style="width:100%; padding:12px; background:#222; border:1px solid #333; color:#fff; border-radius:10px; height:80px;"></textarea>
        <button onclick="sendGreeting()" style="width:100%; padding:12px; background:var(--primary); color:#fff; border:none; cursor:pointer; border-radius:10px; font-weight:bold;">שלח הודעה</button>
    </div>
</div>

<script>
let ytPlayer;
let isYtReady = false;
let isPlaying = false;
let currentMode = 'none'; // 'youtube' or 'backup'
let pendingYtId = null;

const playBtn = document.getElementById('master-play-btn');
const btnIcon = document.getElementById('btn-icon');
const statusText = document.getElementById('status-text');
const liveText = document.getElementById('live-status-text');
const liveDot = document.getElementById('live-status-dot');
const backupFrame = document.getElementById('backup-engine');

// טעינת YouTube API
var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('youtube-engine', {
        height: '1', width: '1', videoId: '',
        playerVars: { 'autoplay': 0, 'controls': 0 },
        events: {
            'onReady': onYtReady,
            'onStateChange': onYtStateChange,
            'onError': switchToBackup
        }
    });
}

function onYtReady() {
    isYtReady = true;
    playBtn.disabled = false;
    if (pendingYtId) {
        ytPlayer.cueVideoById(pendingYtId);
        checkLiveStatus(pendingYtId);
        pendingYtId = null;
    }
}

function checkLiveStatus(id) {
    if(!id) {
        switchToBackup();
        return;
    }
    // בגרסה זו, אנחנו פשוט מנסים לטעון. אם יוטיוב יחזיר שגיאה, הוא יעבור לגיבוי.
    currentMode = 'youtube';
    liveText.innerText = "LIVE ON YOUTUBE";
    liveDot.className = "live-dot";
    statusText.innerText = "מוכן לשידור חי";
}

function switchToBackup() {
    currentMode = 'backup';
    liveText.innerText = "ARCHIVE PLAYER";
    liveDot.className = "live-dot offline";
    statusText.innerText = "מנגן מהארכיון";
    if(ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
}

function onYtStateChange(event) {
    if (event.data == YT.PlayerState.PLAYING) {
        isPlaying = true;
        updateUI(true);
    } else {
        isPlaying = false;
        updateUI(false);
    }
}

function updateUI(playing) {
    btnIcon.className = playing ? "fa-solid fa-pause" : "fa-solid fa-play";
    if (playing) playBtn.classList.add('is-playing');
    else playBtn.classList.remove('is-playing');
}

playBtn.addEventListener('click', () => {
    if (currentMode === 'youtube') {
        if (isPlaying) ytPlayer.pauseVideo();
        else ytPlayer.playVideo();
    } else {
        // שליטה על ה-Iframe של הארכיון היא מוגבלת, אז פשוט נפעיל/נכבה את ה-Src או נשתמש בפוסט-מסג'
        // בגלל מגבלות Iframe, הדרך הכי פשוטה היא לשלוח "Play" לנגן
        isPlaying = !isPlaying;
        updateUI(isPlaying);
        // הערה: נגני Archive.org בדרך כלל דורשים אינטראקציה ישירה בתוך ה-Iframe.
        // כאן המשתמש יוכל לשמוע את הסאונד ברקע.
        if(!isPlaying) backupFrame.src = ""; 
        else backupFrame.src = "https://archive.org/embed/the-unforgiven-remasteredmp-3j.cc_20260321&autoplay=1";
    }
});
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
    authDomain: "radio-163cd.firebaseapp.com",
    projectId: "radio-163cd",
    appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection('settings').doc('dj_info').onSnapshot(doc => {
    if(doc.exists) {
        const data = doc.data();
        if(data.image) document.getElementById('dj-image-display').src = data.image;
        if(data.youtubeId) {
            if (isYtReady) {
                ytPlayer.cueVideoById(data.youtubeId);
                checkLiveStatus(data.youtubeId);
            } else {
                pendingYtId = data.youtubeId;
            }
        } else {
            switchToBackup();
        }
    }
});

function sendGreeting() {
    const n = document.getElementById('msg-name').value.trim();
    const c = document.getElementById('msg-content').value.trim();
    if(!n || !c) return;
    db.collection('greetings').add({
        sender: n, text: c, timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        document.getElementById('msg-content').value = "";
        alert("הד\"ש נשלח!");
    });
}
</script>
</body>
</html>
