<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רדיו | מדברים בדסמ</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --secondary: #2f3542;
            --success: #2ed573;
            --danger: #eb4d4b;
            --bg: #0f1116;
            --card: #1c1e26;
            --input-bg: #262933;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.5;
            direction: rtl;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        h2 { 
            font-size: 22px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 500; 
            font-size: 15px; 
            color: var(--text-dim);
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
            text-align: right;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 25px; 
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: var(--primary-hover); transform: scale(1.02); }

        .btn-clear { background: var(--secondary); color: white; }
        
        .preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #262933;
            padding: 15px;
            border-radius: 15px;
            flex: 1;
            margin-bottom: 10px;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #111;
        }

        .schedule-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: var(--input-bg);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
        }

        .status-live { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .status-offline { background: rgba(164, 176, 190, 0.2); color: var(--text-dim); }

        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STUDIO CONTROL</h1>
        <p>מערכת ניהול תוכן - רדיו מדברים בדס"מ</p>
    </header>

    <!-- LIVE CONTROL -->
    <div class="card">
        <h2><i class="fa-solid fa-tower-broadcast"></i> ניהול שידור חי</h2>
        <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 25px;">
            <span>סטטוס מערכת:</span>
            <div id="current-status" class="status-badge status-offline">
                <span id="status-text">טוען...</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>מלל חופשי / הודעה רצה בנגן</label>
            <textarea id="scrolling-text" placeholder="הכנס הודעה שתופיע בנגן..." rows="2"></textarea>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>שם השדרן</label>
                <input type="text" id="dj-name" placeholder="מי בשידור?">
            </div>
            <div class="form-group">
                <label>URL של הסטרים (Icecast/MP3)</label>
                <input type="text" id="stream-url" placeholder="לינק לנגן">
            </div>
        </div>
        <div class="grid" style="margin-bottom: 20px;">
            <div class="preview-area">
                <img id="dj-img-preview" class="preview-img" src="https://via.placeholder.com/80?text=DJ">
                <input type="file" id="dj-file-input" style="display:none" onchange="handleImageUpload('dj')">
                <button onclick="document.getElementById('dj-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">החלף תמונת שדרן</button>
            </div>
            <div class="preview-area">
                <img id="offline-img-preview" class="preview-img" src="https://via.placeholder.com/80?text=OFF">
                <input type="file" id="offline-file-input" style="display:none" onchange="handleImageUpload('offline')">
                <button onclick="document.getElementById('offline-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">תמונת Offline</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-save" style="flex:2" onclick="updateLive()"><i class="fa-solid fa-play"></i> עדכן וצא לשידור</button>
            <button class="btn-clear" style="flex:1" onclick="clearLive()"><i class="fa-solid fa-stop"></i> הפסק שידור</button>
        </div>
    </div>

    <!-- WEEKLY SCHEDULE -->
    <div class="card">
        <h2><i class="fa-solid fa-calendar-days"></i> לוח שידורים שבועי (מלל חופשי)</h2>
        <div class="schedule-tabs" id="day-tabs">
            <button class="tab-btn active" onclick="switchDay('sunday')">ראשון</button>
            <button class="tab-btn" onclick="switchDay('monday')">שני</button>
            <button class="tab-btn" onclick="switchDay('tuesday')">שלישי</button>
            <button class="tab-btn" onclick="switchDay('wednesday')">רביעי</button>
            <button class="tab-btn" onclick="switchDay('thursday')">חמישי</button>
            <button class="tab-btn" onclick="switchDay('friday')">שישי</button>
            <button class="tab-btn" onclick="switchDay('saturday')">שבת</button>
        </div>

        <div class="form-group">
            <label>מה משודר ביום <span class="active-day-text">ראשון</span>?</label>
            <textarea id="schedule-free-text" placeholder="כתוב כאן את לוח השידורים של היום בצורה חופשית..." rows="10"></textarea>
        </div>

        <button class="btn-save" style="width: 100%;" onclick="saveSchedule()">
            <i class="fa-solid fa-floppy-disk"></i> שמור לוח שידורים ליום <span class="active-day-text">ראשון</span>
        </button>
    </div>

    <!-- EVENTS -->
    <div class="grid">
        <!-- Event 1 -->
        <div class="card">
            <h2><i class="fa-solid fa-star"></i> אירוע 1</h2>
            
            <div class="preview-area">
                <img id="p1-img-preview" class="preview-img" src="https://via.placeholder.com/80?text=Party+1">
                <input type="file" id="p1-file-input" style="display:none" onchange="handleImageUpload('p1')">
                <button onclick="document.getElementById('p1-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">העלה תמונת אירוע</button>
            </div>

            <input type="text" id="p1-title" placeholder="כותרת האירוע" class="form-group">
            <div class="grid" style="gap:10px; grid-template-columns: 1fr 1fr;">
                <input type="text" id="p1-date" placeholder="תאריך ושעה" class="form-group">
                <input type="text" id="p1-link" placeholder="לינק לכרטיסים/מידע" class="form-group">
            </div>
            <textarea id="p1-free-text" placeholder="מלל חופשי לאירוע" rows="2" class="form-group"></textarea>
            <textarea id="p1-desc" placeholder="תיאור מלא" rows="3"></textarea>
        </div>

        <!-- Event 2 -->
        <div class="card">
            <h2><i class="fa-solid fa-calendar-check"></i> אירוע 2</h2>

            <div class="preview-area">
                <img id="p2-img-preview" class="preview-img" src="https://via.placeholder.com/80?text=Party+2">
                <input type="file" id="p2-file-input" style="display:none" onchange="handleImageUpload('p2')">
                <button onclick="document.getElementById('p2-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">העלה תמונת אירוע</button>
            </div>

            <input type="text" id="p2-title" placeholder="כותרת האירוע" class="form-group">
            <div class="grid" style="gap:10px; grid-template-columns: 1fr 1fr;">
                <input type="text" id="p2-date" placeholder="תאריך ושעה" class="form-group">
                <input type="text" id="p2-link" placeholder="לינק לכרטיסים/מידע" class="form-group">
            </div>
            <textarea id="p2-free-text" placeholder="מלל חופשי לאירוע" rows="2" class="form-group"></textarea>
            <textarea id="p2-desc" placeholder="תיאור מלא" rows="3"></textarea>
        </div>
    </div>
    
    <button class="btn-save" onclick="updateParties()" style="margin-bottom: 50px; width:100%;"><i class="fa-solid fa-check"></i> שמור נתוני אירועים ותמונות</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
        authDomain: "radio-163cd.firebaseapp.com",
        projectId: "radio-163cd",
        appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let djBase64 = "", offlineBase64 = "", p1Base64 = "", p2Base64 = "";
    let currentDay = "sunday", fullSchedule = {};

    const dayNames = {
        sunday: "ראשון", monday: "שני", tuesday: "שלישי", 
        wednesday: "רביעי", thursday: "חמישי", friday: "שישי", saturday: "שבת"
    };

    // Load Schedule
    db.collection('settings').doc('schedule').onSnapshot(doc => {
        if (doc.exists) {
            fullSchedule = doc.data();
            loadDayData();
        }
    });

    function loadDayData() {
        const data = fullSchedule[currentDay];
        let text = "";
        if (data) text = typeof data === 'string' ? data : (data.freeText || "");
        document.getElementById('schedule-free-text').value = text;
    }

    function switchDay(day) {
        currentDay = day;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.innerText === dayNames[day]);
        if(activeBtn) activeBtn.classList.add('active');
        document.querySelectorAll('.active-day-text').forEach(el => el.innerText = dayNames[day]);
        loadDayData();
    }

    async function saveSchedule() {
        fullSchedule[currentDay] = { freeText: document.getElementById('schedule-free-text').value };
        try {
            await db.collection('settings').doc('schedule').set(fullSchedule);
            alert(`לוח השידורים ליום ${dayNames[currentDay]} נשמר!`);
        } catch (e) { alert("שגיאה: " + e.message); }
    }

    // Live Control
    db.collection('settings').doc('dj_info').onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('dj-name').value = d.name || "";
            document.getElementById('stream-url').value = d.streamUrl || "";
            document.getElementById('scrolling-text').value = d.scrollingText || "";
            if(d.image) document.getElementById('dj-img-preview').src = d.image;
            if(d.offlineImage) document.getElementById('offline-img-preview').src = d.offlineImage;
            
            const badge = document.getElementById('current-status'), txt = document.getElementById('status-text');
            if(d.name && d.name !== "") {
                txt.innerText = "בשידור: " + d.name; badge.className = "status-badge status-live";
            } else {
                txt.innerText = "OFFLINE"; badge.className = "status-badge status-offline";
            }
        }
    });

    async function updateLive() {
        await db.collection('settings').doc('dj_info').set({
            name: document.getElementById('dj-name').value,
            streamUrl: document.getElementById('stream-url').value,
            scrollingText: document.getElementById('scrolling-text').value,
            image: djBase64 || document.getElementById('dj-img-preview').src,
            offlineImage: offlineBase64 || document.getElementById('offline-img-preview').src
        }, { merge: true });
        alert("שידור חי עודכן!");
    }

    async function clearLive() {
        await db.collection('settings').doc('dj_info').update({ name: "", image: document.getElementById('offline-img-preview').src });
        alert("השידור הופסק");
    }

    // Handle Image Uploads with Resizing
    function handleImageUpload(type) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                // Target size for performance
                cvs.width = 400; cvs.height = 400;
                cvs.getContext('2d').drawImage(img, 0, 0, 400, 400);
                const url = cvs.toDataURL('image/jpeg', 0.7);
                
                if(type === 'dj') { djBase64 = url; document.getElementById('dj-img-preview').src = url; }
                else if(type === 'offline') { offlineBase64 = url; document.getElementById('offline-img-preview').src = url; }
                else if(type === 'p1') { p1Base64 = url; document.getElementById('p1-img-preview').src = url; }
                else if(type === 'p2') { p2Base64 = url; document.getElementById('p2-img-preview').src = url; }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function updateParties() {
        const data = {
            party1: { 
                title: document.getElementById('p1-title').value, 
                date: document.getElementById('p1-date').value, 
                link: document.getElementById('p1-link').value, 
                freeText: document.getElementById('p1-free-text').value,
                desc: document.getElementById('p1-desc').value,
                image: p1Base64 || document.getElementById('p1-img-preview').src
            },
            party2: { 
                title: document.getElementById('p2-title').value, 
                date: document.getElementById('p2-date').value, 
                link: document.getElementById('p2-link').value, 
                freeText: document.getElementById('p2-free-text').value,
                desc: document.getElementById('p2-desc').value,
                image: p2Base64 || document.getElementById('p2-img-preview').src
            }
        };
        try {
            await db.collection('settings').doc('parties_info').set(data);
            alert("אירועים ותמונות עודכנו בהצלחה!");
        } catch (e) { alert("שגיאה: " + e.message); }
    }

    // Load Party Info on Start
    db.collection('settings').doc('parties_info').get().then(doc => {
        if(doc.exists) {
            const d = doc.data();
            if(d.party1) {
                document.getElementById('p1-title').value = d.party1.title || "";
                document.getElementById('p1-date').value = d.party1.date || "";
                document.getElementById('p1-link').value = d.party1.link || "";
                document.getElementById('p1-free-text').value = d.party1.freeText || "";
                document.getElementById('p1-desc').value = d.party1.desc || "";
                if(d.party1.image) document.getElementById('p1-img-preview').src = d.party1.image;
            }
            if(d.party2) {
                document.getElementById('p2-title').value = d.party2.title || "";
                document.getElementById('p2-date').value = d.party2.date || "";
                document.getElementById('p2-link').value = d.party2.link || "";
                document.getElementById('p2-free-text').value = d.party2.freeText || "";
                document.getElementById('p2-desc').value = d.party2.desc || "";
                if(d.party2.image) document.getElementById('p2-img-preview').src = d.party2.image;
            }
        }
    });
</script>
</body>
</html>
