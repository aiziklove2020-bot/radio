<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רדיו | מדברים בדסמ</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --secondary: #2f3542;
            --success: #2ed573;
            --danger: #eb4d4b;
            --bg: #0f1116;
            --card: #1c1e26;
            --input-bg: #262933;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .card-full { grid-column: 1 / -1; }

        h2 { 
            font-size: 22px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 500; 
            font-size: 15px; 
            color: var(--text-dim);
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 25px; 
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: var(--primary-hover); transform: scale(1.02); }

        .btn-clear { background: var(--secondary); color: white; }
        .btn-danger-outline { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger); 
            font-size: 13px;
            padding: 8px 15px;
        }
        .btn-danger-outline:hover { background: var(--danger); color: white; }

        /* Schedule Specific Styles */
        .schedule-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: var(--input-bg);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .schedule-header {
            display: grid;
            grid-template-columns: 120px 1fr 1fr 50px;
            gap: 15px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 120px 1fr 1fr 50px;
            gap: 15px;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .schedule-row:hover { background: rgba(255,255,255,0.06); }

        .time-label { font-weight: bold; color: var(--primary); font-size: 14px; }

        .btn-icon-delete {
            background: rgba(235, 77, 75, 0.1);
            color: var(--danger);
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 10px;
        }
        .btn-icon-delete:hover { background: var(--danger); color: white; }

        .status-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
        }

        .status-live { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .status-offline { background: rgba(164, 176, 190, 0.2); color: var(--text-dim); }

        .preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #262933;
            padding: 15px;
            border-radius: 15px;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; }
            .schedule-header { display: none; }
            .schedule-row { grid-template-columns: 1fr 1fr; gap: 8px; }
            .time-label { grid-column: 1 / -1; }
            .btn-icon-delete { grid-column: 2; justify-self: end; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STUDIO CONTROL</h1>
        <p>מערכת ניהול תוכן - רדיו מדברים בדס"מ</p>
    </header>

    <!-- LIVE CONTROL -->
    <div class="card card-full">
        <h2><i class="fa-solid fa-tower-broadcast"></i> ניהול שידור חי</h2>
        <div class="status-wrapper">
            <span>סטטוס מערכת:</span>
            <div id="current-status" class="status-badge status-offline">
                <span id="status-text">טוען...</span>
            </div>
        </div>
        <div class="grid">
            <div class="form-group">
                <label>שם השדרן</label>
                <input type="text" id="dj-name" placeholder="מי בשידור?">
            </div>
            <div class="form-group">
                <label>YouTube ID</label>
                <input type="text" id="yt-id" placeholder="למשל: dQw4w9WgXcQ">
            </div>
        </div>
        <div class="grid" style="margin-bottom: 20px;">
            <div class="preview-area">
                <img id="dj-img-preview" class="preview-img" src="https://via.placeholder.com/60?text=DJ">
                <input type="file" id="dj-file-input" style="display:none" onchange="handleImageUpload('dj')">
                <button onclick="document.getElementById('dj-file-input').click()" style="font-size: 12px; background: var(--secondary); flex: none;">החלף תמונת שדרן</button>
            </div>
            <div class="preview-area">
                <img id="offline-img-preview" class="preview-img" src="https://via.placeholder.com/60?text=OFF">
                <input type="file" id="offline-file-input" style="display:none" onchange="handleImageUpload('offline')">
                <button onclick="document.getElementById('offline-file-input').click()" style="font-size: 12px; background: var(--secondary); flex: none;">החלף תמונת Offline</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-save" style="flex:2" onclick="updateLive()"><i class="fa-solid fa-play"></i> עדכן וצא לשידור</button>
            <button class="btn-clear" style="flex:1" onclick="clearLive()"><i class="fa-solid fa-stop"></i> הפסק שידור</button>
        </div>
    </div>

    <!-- WEEKLY SCHEDULE -->
    <div class="card card-full">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 style="border:none; margin:0; padding:0;"><i class="fa-solid fa-calendar-days"></i> לוח שידורים שבועי</h2>
            <button class="btn-danger-outline" onclick="clearEntireDay()">
                <i class="fa-solid fa-trash-can"></i> נקה את כל יום <span class="active-day-text">ראשון</span>
            </button>
        </div>
        
        <div class="schedule-tabs" id="day-tabs">
            <button class="tab-btn active" onclick="switchDay('sunday')">ראשון</button>
            <button class="tab-btn" onclick="switchDay('monday')">שני</button>
            <button class="tab-btn" onclick="switchDay('tuesday')">שלישי</button>
            <button class="tab-btn" onclick="switchDay('wednesday')">רביעי</button>
            <button class="tab-btn" onclick="switchDay('thursday')">חמישי</button>
            <button class="tab-btn" onclick="switchDay('friday')">שישי</button>
            <button class="tab-btn" onclick="switchDay('saturday')">שבת</button>
        </div>

        <div id="schedule-editor">
            <div class="schedule-header">
                <div>שעה</div>
                <div>שם התוכנית</div>
                <div>שדרן/ית</div>
                <div></div>
            </div>
            <div id="time-slots-container">
                <!-- Dynamic slots will be injected here -->
            </div>
        </div>

        <button class="btn-save" style="margin-top: 25px; width: 100%;" onclick="saveSchedule()">
            <i class="fa-solid fa-floppy-disk"></i> שמור שינויים ליום <span class="active-day-text">ראשון</span>
        </button>
    </div>

    <!-- PARTIES -->
    <div class="grid">
        <div class="card">
            <h2><i class="fa-solid fa-star"></i> מסיבה 1</h2>
            <input type="text" id="p1-title" placeholder="כותרת" class="form-group">
            <input type="text" id="p1-date" placeholder="תאריך" class="form-group">
            <input type="text" id="p1-img" placeholder="לינק לתמונה" class="form-group">
            <input type="text" id="p1-link" placeholder="לינק לכרטיסים" class="form-group">
            <textarea id="p1-desc" placeholder="תיאור" rows="2" style="width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; color:white; padding:12px;"></textarea>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-calendar-check"></i> מסיבה 2</h2>
            <input type="text" id="p2-title" placeholder="כותרת" class="form-group">
            <input type="text" id="p2-date" placeholder="תאריך" class="form-group">
            <input type="text" id="p2-img" placeholder="לינק לתמונה" class="form-group">
            <input type="text" id="p2-link" placeholder="לינק לכרטיסים" class="form-group">
            <textarea id="p2-desc" placeholder="תיאור" rows="2" style="width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; color:white; padding:12px;"></textarea>
        </div>
    </div>
    <button class="btn-save" onclick="updateParties()" style="margin-bottom: 50px; width:100%;"><i class="fa-solid fa-check"></i> שמור נתוני מסיבות</button>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
        authDomain: "radio-163cd.firebaseapp.com",
        projectId: "radio-163cd",
        appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let djBase64 = ""; 
    let offlineBase64 = "";
    let currentDay = "sunday";
    let fullSchedule = {};

    const timeSlots = [
        "08:00 - 10:00", "10:00 - 12:00", "12:00 - 14:00", 
        "14:00 - 16:00", "16:00 - 18:00", "18:00 - 20:00", 
        "20:00 - 22:00", "22:00 - 00:00", "00:00 - 08:00"
    ];

    const dayNames = {
        sunday: "ראשון", monday: "שני", tuesday: "שלישי", 
        wednesday: "רביעי", thursday: "חמישי", friday: "שישי", saturday: "שבת"
    };

    function renderSlots() {
        const container = document.getElementById('time-slots-container');
        container.innerHTML = '';
        timeSlots.forEach((slot, index) => {
            const div = document.createElement('div');
            div.className = 'schedule-row';
            div.innerHTML = `
                <div class="time-label">${slot}</div>
                <input type="text" id="prog-${index}" placeholder="שם התוכנית">
                <input type="text" id="host-${index}" placeholder="שדרן">
                <button class="btn-icon-delete" onclick="clearSlot(${index})" title="מחק משבצת זו">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;
            container.appendChild(div);
        });
        // טעינה ראשונית של כל הלוח
        loadAllSchedule();
    }

    function switchDay(day) {
        currentDay = day;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.trim() === dayNames[day]);
        if(activeBtn) activeBtn.classList.add('active');
        
        document.querySelectorAll('.active-day-text').forEach(el => el.innerText = dayNames[day]);
        loadDayData();
    }

    async function loadAllSchedule() {
        // האזנה לשינויים בזמן אמת כדי להבטיח סנכרון מלא
        db.collection('settings').doc('schedule').onSnapshot(doc => {
            if (doc.exists) {
                fullSchedule = doc.data();
                loadDayData();
            }
        });
    }

    function loadDayData() {
        // ניקוי לפני טעינת יום חדש כדי למנוע שאריות
        clearInputs();
        if (fullSchedule[currentDay]) {
            fillInputs(fullSchedule[currentDay]);
        }
    }

    function fillInputs(data) {
        timeSlots.forEach((_, i) => {
            const progInput = document.getElementById(`prog-${i}`);
            const hostInput = document.getElementById(`host-${i}`);
            if (progInput && hostInput) {
                progInput.value = data[i]?.title || "";
                hostInput.value = data[i]?.host || "";
            }
        });
    }

    function clearInputs() {
        timeSlots.forEach((_, i) => {
            const progInput = document.getElementById(`prog-${i}`);
            const hostInput = document.getElementById(`host-${i}`);
            if (progInput && hostInput) {
                progInput.value = "";
                hostInput.value = "";
            }
        });
    }

    function clearSlot(index) {
        document.getElementById(`prog-${index}`).value = "";
        document.getElementById(`host-${index}`).value = "";
    }

    function clearEntireDay() {
        if(confirm(`האם אתה בטוח שברצונך למחוק את כל השידורים של יום ${dayNames[currentDay]}?`)) {
            clearInputs();
        }
    }

    async function saveSchedule() {
        const dayData = {};
        timeSlots.forEach((_, i) => {
            dayData[i] = {
                title: document.getElementById(`prog-${i}`).value.trim(),
                host: document.getElementById(`host-${i}`).value.trim()
            };
        });

        // עדכון האובייקט המקומי לפני השליחה
        fullSchedule[currentDay] = dayData;

        try {
            // שמירה של כל האובייקט (כל השבוע) כדי לוודא ששום יום אחר לא נמחק
            await db.collection('settings').doc('schedule').set(fullSchedule, { merge: true });
            alert(`לוח השידורים ליום ${dayNames[currentDay]} סונכרן ונשמר בהצלחה!`);
        } catch (e) {
            console.error("Error saving schedule: ", e);
            alert("שגיאה בסנכרון מול השרת: " + e.message);
        }
    }

    // --- Live & Parties logic ---
    db.collection('settings').doc('dj_info').onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('dj-name').value = data.name || "";
            document.getElementById('yt-id').value = data.youtubeId || "";
            if(data.image) document.getElementById('dj-img-preview').src = data.image;
            if(data.offlineImage) document.getElementById('offline-img-preview').src = data.offlineImage;
            
            const statusBadge = document.getElementById('current-status');
            const statusText = document.getElementById('status-text');
            if(data.youtubeId) {
                statusText.innerText = "בשידור חי: " + (data.name || "שדרן");
                statusBadge.className = "status-badge status-live";
            } else {
                statusText.innerText = "OFFLINE - פלייליסט";
                statusBadge.className = "status-badge status-offline";
            }
        }
    });

    async function updateLive() {
        const name = document.getElementById('dj-name').value;
        const ytId = document.getElementById('yt-id').value;
        if(!ytId) return alert("חובה להזין ID של יוטיוב");
        await db.collection('settings').doc('dj_info').update({
            name, youtubeId: ytId, image: djBase64 || document.getElementById('dj-img-preview').src,
            offlineImage: offlineBase64 || document.getElementById('offline-img-preview').src,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("שידור חי עודכן!");
    }

    async function clearLive() {
        const offImg = document.getElementById('offline-img-preview').src;
        await db.collection('settings').doc('dj_info').update({
            youtubeId: "", name: "", image: offImg,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("השידור הופסק");
    }

    function handleImageUpload(type) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400; canvas.height = 400;
                canvas.getContext('2d').drawImage(img, 0, 0, 400, 400);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                if(type==='dj') { djBase64 = dataUrl; document.getElementById('dj-img-preview').src = dataUrl; }
                else { offlineBase64 = dataUrl; document.getElementById('offline-img-preview').src = dataUrl; }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function updateParties() {
        const partyData = {
            party1: {
                title: document.getElementById('p1-title').value,
                date: document.getElementById('p1-date').value,
                img: document.getElementById('p1-img').value,
                link: document.getElementById('p1-link').value,
                desc: document.getElementById('p1-desc').value
            },
            party2: {
                title: document.getElementById('p2-title').value,
                date: document.getElementById('p2-date').value,
                img: document.getElementById('p2-img').value,
                link: document.getElementById('p2-link').value,
                desc: document.getElementById('p2-desc').value
            }
        };
        await db.collection('settings').doc('parties_info').set(partyData);
        alert("המסיבות עודכנו!");
    }

    // הפעלה ראשונית
    renderSlots();
</script>

</body>
</html>
