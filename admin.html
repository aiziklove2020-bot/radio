<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רדיו | מדברים בדסמ</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --secondary: #2f3542;
            --success: #2ed573;
            --warning: #ffa502;
            --bg: #0f1116;
            --card: #1c1e26;
            --input-bg: #262933;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card-full { grid-column: 1 / -1; }

        h2 { 
            font-size: 22px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 500; 
            font-size: 15px; 
            color: var(--text-dim);
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #2d313d;
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 25px; 
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: var(--primary-hover); transform: scale(1.02); }

        .btn-clear { background: var(--secondary); color: white; }
        .btn-clear:hover { background: #3f4552; }

        .status-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-live { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .status-offline { background: rgba(164, 176, 190, 0.2); color: var(--text-dim); }

        .pulse {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 213, 115, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }

        .preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #262933;
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            background: #111;
            border: 2px solid var(--border);
        }

        .party-box {
            background: #262933;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STUDIO CONTROL</h1>
        <p>לוח הבקרה של רדיו מדברים בדס"מ</p>
    </header>

    <div class="grid">
        <!-- כרטיס שידור חי -->
        <div class="card card-full">
            <h2><i class="fa-solid fa-tower-broadcast"></i> ניהול שידור חי</h2>
            
            <div class="status-wrapper">
                <span style="font-weight: 500;">סטטוס מערכת נוכחי:</span>
                <div id="current-status" class="status-badge status-offline">
                    <div class="pulse"></div>
                    <span id="status-text">טוען...</span>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label><i class="fa-solid fa-user-tag"></i> שם השדרן</label>
                    <input type="text" id="dj-name" placeholder="מי עולה לשידור?">
                </div>
                <div class="form-group">
                    <label><i class="fa-brands fa-youtube"></i> YouTube Video ID</label>
                    <input type="text" id="yt-id" placeholder="לדוגמה: dQw4w9WgXcQ">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-upload"></i> העלאת תמונת שדרן מהמחשב</label>
                <input type="file" id="dj-file-input" accept="image/*" onchange="previewFile()">
                <div class="preview-area">
                    <img id="dj-img-preview" class="preview-img" src="https://via.placeholder.com/80?text=DJ">
                    <div>
                        <div style="font-size: 14px; font-weight: bold;">תצוגה מקדימה</div>
                        <div id="file-status" style="font-size: 12px; color: var(--text-dim);">טרם נבחר קובץ</div>
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-save" onclick="updateLive()">
                    <i class="fa-solid fa-paper-plane"></i> עדכן ועלה לאוויר
                </button>
                <button class="btn-clear" onclick="clearLive()">
                    <i class="fa-solid fa-stop"></i> הפסק שידור וחזור לפלייליסט
                </button>
            </div>
        </div>

        <!-- מסיבה 1 -->
        <div class="card">
            <h2><i class="fa-solid fa-star"></i> מסיבה קרובה 1</h2>
            <div class="party-box">
                <div class="form-group">
                    <input type="text" id="p1-title" placeholder="כותרת האירוע">
                </div>
                <div class="form-group">
                    <input type="text" id="p1-date" placeholder="תאריך (לדוגמה: 25.03 | 22:00)">
                </div>
                <div class="form-group">
                    <input type="text" id="p1-img" placeholder="קישור לתמונה (URL)">
                </div>
                <div class="form-group">
                    <input type="text" id="p1-link" placeholder="קישור לכרטיסים">
                </div>
                <textarea id="p1-desc" placeholder="תיאור קצר על המסיבה..." rows="3"></textarea>
            </div>
        </div>

        <!-- מסיבה 2 -->
        <div class="card">
            <h2><i class="fa-solid fa-calendar-check"></i> מסיבה קרובה 2</h2>
            <div class="party-box">
                <div class="form-group">
                    <input type="text" id="p2-title" placeholder="כותרת האירוע">
                </div>
                <div class="form-group">
                    <input type="text" id="p2-date" placeholder="תאריך">
                </div>
                <div class="form-group">
                    <input type="text" id="p2-img" placeholder="קישור לתמונה (URL)">
                </div>
                <div class="form-group">
                    <input type="text" id="p2-link" placeholder="קישור לכרטיסים">
                </div>
                <textarea id="p2-desc" placeholder="תיאור קצר..." rows="3"></textarea>
            </div>
        </div>

        <div class="card card-full" style="text-align: center; padding: 20px;">
            <button class="btn-save" style="max-width: 400px; margin: 0 auto;" onclick="updateParties()">
                <i class="fa-solid fa-floppy-disk"></i> שמור את כל השינויים במסיבות
            </button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
        authDomain: "radio-163cd.firebaseapp.com",
        projectId: "radio-163cd",
        appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let base64Image = ""; // משתנה גלובלי לאחסון התמונה שהועלתה

    // Listener for live state
    db.collection('settings').doc('dj_info').onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('dj-name').value = data.name || "";
            document.getElementById('yt-id').value = data.youtubeId || "";
            
            if(data.image) {
                document.getElementById('dj-img-preview').src = data.image;
                base64Image = data.image;
            }
            
            const statusBadge = document.getElementById('current-status');
            const statusText = document.getElementById('status-text');
            
            if(data.youtubeId && data.youtubeId.trim() !== "") {
                statusText.innerText = "בשידור חי: " + (data.name || "שדרן");
                statusBadge.className = "status-badge status-live";
            } else {
                statusText.innerText = "פלייליסט (OFFLINE)";
                statusBadge.className = "status-badge status-offline";
            }
        }
    });

    // פונקציית תצוגה מקדימה והמרת קובץ ל-Base64
    function previewFile() {
        const file = document.getElementById('dj-file-input').files[0];
        const reader = new FileReader();

        reader.onloadend = function() {
            base64Image = reader.result;
            document.getElementById('dj-img-preview').src = base64Image;
            document.getElementById('file-status').innerText = "קובץ נטען בהצלחה";
        }

        if (file) {
            reader.readAsDataURL(file);
        }
    }

    // Listener for parties
    db.collection('settings').doc('parties_info').onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            if(data.party1) {
                document.getElementById('p1-title').value = data.party1.title || "";
                document.getElementById('p1-date').value = data.party1.date || "";
                document.getElementById('p1-img').value = data.party1.img || "";
                document.getElementById('p1-link').value = data.party1.link || "";
                document.getElementById('p1-desc').value = data.party1.desc || "";
            }
            if(data.party2) {
                document.getElementById('p2-title').value = data.party2.title || "";
                document.getElementById('p2-date').value = data.party2.date || "";
                document.getElementById('p2-img').value = data.party2.img || "";
                document.getElementById('p2-link').value = data.party2.link || "";
                document.getElementById('p2-desc').value = data.party2.desc || "";
            }
        }
    });

    async function updateLive() {
        const name = document.getElementById('dj-name').value;
        const ytId = document.getElementById('yt-id').value;

        if(!ytId) {
            alert("נא להזין YouTube ID כדי לעלות לשידור");
            return;
        }

        try {
            await db.collection('settings').doc('dj_info').set({
                name: name,
                youtubeId: ytId,
                image: base64Image // שומר את ה-Base64 ב-Firestore
            }, { merge: true });
            alert("השידור עודכן והתמונה הועלתה בהצלחה!");
        } catch (e) {
            alert("שגיאה: " + e.message);
        }
    }

    async function clearLive() {
        if(!confirm("להפסיק את השידור ולחזור למוזיקה ברצף?")) return;
        try {
            await db.collection('settings').doc('dj_info').update({
                youtubeId: "",
                name: ""
            });
            alert("חזרנו למצב פלייליסט");
        } catch (e) {
            alert("שגיאה: " + e.message);
        }
    }

    async function updateParties() {
        const partyData = {
            party1: {
                title: document.getElementById('p1-title').value,
                date: document.getElementById('p1-date').value,
                img: document.getElementById('p1-img').value,
                link: document.getElementById('p1-link').value,
                desc: document.getElementById('p1-desc').value
            },
            party2: {
                title: document.getElementById('p2-title').value,
                date: document.getElementById('p2-date').value,
                img: document.getElementById('p2-img').value,
                link: document.getElementById('p2-link').value,
                desc: document.getElementById('p2-desc').value
            }
        };

        try {
            await db.collection('settings').doc('parties_info').set(partyData);
            alert("המסיבות עודכנו בהצלחה!");
        } catch (e) {
            alert("שגיאה: " + e.message);
        }
    }
</script>

</body>
</html>
