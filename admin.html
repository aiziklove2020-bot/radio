<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ניהול — רדיו מדברים בדסמ</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#c0392b;--red2:#e74c3c;--bg:#111;--bg2:#181818;--border:rgba(255,255,255,0.08);--muted:#888;}
body{background:var(--bg);color:#f0f0f0;font-family:'Heebo',sans-serif;min-height:100vh;}

.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center;}
.login-card .logo{font-size:48px;margin-bottom:16px;}
.login-card h2{font-size:24px;margin-bottom:24px;font-weight:700;}
.input-group{margin-bottom:16px;text-align:right;}
.input-group label{display:block;margin-bottom:8px;font-size:14px;color:var(--muted);}
input[type="text"], input[type="password"]{width:100%;background:#000;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:#fff;font-family:inherit;transition:0.2s;}
input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(192,57,43,0.2);}

.file-input-wrapper {
    margin-top: 10px;
    position: relative;
    overflow: hidden;
    display: inline-block;
    width: 100%;
}
.file-input-wrapper input[type=file] {
    font-size: 100px;
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0;
    cursor: pointer;
}
.btn-upload {
    background: #333;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px dashed var(--muted);
    cursor: pointer;
    display: block;
    text-align: center;
    transition: 0.3s;
}
.btn-upload:hover{background: #444; border-color: var(--red2);}

.btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:14px;font-weight:700;cursor:pointer;margin-top:12px;transition:0.2s;}
.btn:hover{background:var(--red2);transform:translateY(-2px);}

.admin-ui{display:none;padding:40px 20px;max-width:800px;margin:0 auto;}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;border-bottom:1px solid var(--border);padding-bottom:20px;}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;}
.section h3{margin-bottom:20px;font-size:18px;border-right:3px solid var(--red);padding-right:12px;}

.toast{position:fixed;bottom:24px;right:24px;background:var(--red);color:#fff;padding:12px 24px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:none;z-index:1000;}

#current-img-preview {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    margin-top: 10px;
    border: 3px solid var(--red);
    background: #000;
}

.preview-box {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: 20px;
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 12px;
}

@media(max-width:600px){
    .preview-box { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<div id="login" class="login-screen">
  <div class="login-card">
    <div class="logo">📻</div>
    <h2>כניסת מנהל</h2>
    <div class="input-group">
      <input type="password" id="pass" placeholder="סיסמה סודית..."/>
    </div>
    <button class="btn" onclick="login()">התחבר</button>
  </div>
</div>

<div id="admin" class="admin-ui">
  <header>
    <h1>לוח בקרה - רדיו</h1>
    <button class="btn-del" onclick="location.reload()">התנתק</button>
  </header>

  <div class="section">
    <h3>תמונת שדרן נוכחי</h3>
    <div class="input-group">
      <label>ניתן להעלות קובץ ישירות מהמחשב (מומלץ תמונה מרובעת)</label>
      
      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="file-input-wrapper">
          <div class="btn-upload">📁 לחץ כאן לבחירת תמונה מהמחשב</div>
          <input type="file" id="file-picker" accept="image/*" onchange="handleFileUpload(event)">
        </div>
        <p style="text-align:center; color:var(--muted); font-size:12px;">או הדבק קישור ישיר:</p>
        <input type="text" id="dj-image-url" placeholder="https://example.com/image.jpg">
      </div>

      <div class="preview-box">
        <img id="current-img-preview" src="https://via.placeholder.com/150" alt="Preview">
        <div style="flex:1;">
            <p style="font-size:14px; color:#fff; margin-bottom:10px; font-weight:bold;">תצוגה מקדימה</p>
            <p style="font-size:13px; color:var(--muted); margin-bottom:20px;">השינוי יתעדכן באתר המאזינים מיד לאחר השמירה.</p>
            <button class="btn" id="save-btn" style="width:auto; padding:10px 40px; margin:0;" onclick="updateDJImage()">שמור ועדכן באתר</button>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h3>ניהול סיסמה</h3>
    <div class="input-group">
      <label>סיסמת ניהול נוכחית</label>
      <input type="text" id="cfg-p" placeholder="שנה סיסמה...">
    </div>
    <button class="btn" onclick="updatePass()" style="width:auto; padding:8px 24px;">שמור סיסמה</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Firebase Libraries -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Config - וודא שזה תואם לפרויקט שלך
const firebaseConfig = {
  apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
  authDomain: "radio-163cd.firebaseapp.com",
  projectId: "radio-163cd",
  storageBucket: "radio-163cd.appspot.com",
  messagingSenderId: "367173200259",
  appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function gd(k, d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){return d;} }
function sd(k, v){ localStorage.setItem(k, JSON.stringify(v)); }

function toast(m){ 
  var t = document.getElementById('toast'); 
  t.innerText = m; t.style.display='block'; 
  setTimeout(function(){t.style.display='none';}, 3000); 
}

function login() {
  var p = document.getElementById('pass').value;
  var saved = gd('rdx_p', '1234');
  if(p === saved) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    loadCurrentDJImage();
  } else {
    toast('❌ סיסמה שגויה');
  }
}

// ---- DJ IMAGE HANDLING ----

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    // הגבלה ל-1MB לשיפור ביצועים ב-Firestore
    if (file.size > 1000000) { 
        return toast('⚠️ הקובץ גדול מדי. נא להעלות תמונה קטנה יותר.');
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64String = e.target.result;
        document.getElementById('dj-image-url').value = base64String;
        document.getElementById('current-img-preview').src = base64String;
        toast('📸 התמונה מוכנה! לחץ על שמירה כדי לעדכן');
    };
    reader.readAsDataURL(file);
}

function loadCurrentDJImage() {
    db.collection('settings').doc('dj_info').get().then((doc) => {
        if (doc.exists && doc.data().image) {
            document.getElementById('dj-image-url').value = doc.data().image;
            document.getElementById('current-img-preview').src = doc.data().image;
        }
    }).catch(e => console.error(e));
}

function updateDJImage() {
    const url = document.getElementById('dj-image-url').value.trim();
    if(!url) return toast('⚠️ נא לבחור תמונה');
    
    const btn = document.getElementById('save-btn');
    btn.innerText = 'מעדכן...';
    btn.disabled = true;

    db.collection('settings').doc('dj_info').set({
        image: url,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
        toast('✅ האתר עודכן בהצלחה!');
    }).catch(e => {
        console.error(e);
        toast('❌ שגיאת תקשורת עם Firebase');
    }).finally(() => {
        btn.innerText = 'שמור ועדכן באתר';
        btn.disabled = false;
    });
}

function updatePass() {
  var np = document.getElementById('cfg-p').value.trim();
  if(!np) return;
  sd('rdx_p', np);
  document.getElementById('cfg-p').value='';
  toast('🔐 סיסמה עודכנה!');
}
</script>
</body>
</html>
