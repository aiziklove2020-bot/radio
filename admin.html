<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רדיו | מדברים בדסמ</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --secondary: #2f3542;
            --success: #2ed573;
            --danger: #eb4d4b;
            --bg: #0f1116;
            --card: #1c1e26;
            --input-bg: #262933;
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a4b0be;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.5;
            direction: rtl;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 18px;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        h2 { 
            font-size: 22px; 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        h2 i { color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 500; 
            font-size: 15px; 
            color: var(--text-dim);
        }

        input, textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: 0.3s;
            text-align: right;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-group { 
            display: flex; 
            gap: 12px; 
            margin-top: 25px; 
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: var(--primary-hover); transform: scale(1.02); }

        .btn-clear { background: var(--secondary); color: white; }
        .btn-danger-outline { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger); 
            font-size: 13px;
        }
        .btn-danger-outline:hover { background: var(--danger); color: white; }

        .schedule-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: var(--input-bg);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .schedule-header {
            display: grid;
            grid-template-columns: 140px 1fr 1fr 50px;
            gap: 15px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 13px;
        }

        .schedule-row {
            display: grid;
            grid-template-columns: 140px 1fr 1fr 50px;
            gap: 15px;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .time-label { font-weight: bold; color: var(--primary); font-size: 13px; }

        .btn-icon-delete {
            background: rgba(235, 77, 75, 0.1);
            color: var(--danger);
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 10px;
        }
        .btn-icon-delete:hover { background: var(--danger); color: white; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 800;
        }

        .status-live { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .status-offline { background: rgba(164, 176, 190, 0.2); color: var(--text-dim); }

        .preview-area {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #262933;
            padding: 15px;
            border-radius: 15px;
            flex: 1;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        @media (max-width: 850px) {
            .grid { grid-template-columns: 1fr; }
            .schedule-header { display: none; }
            .schedule-row { grid-template-columns: 1fr 1fr; gap: 8px; }
            .time-label { grid-column: 1 / -1; }
            .btn-icon-delete { grid-column: 2; justify-self: end; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>STUDIO CONTROL</h1>
        <p>מערכת ניהול תוכן - רדיו מדברים בדס"מ</p>
    </header>

    <!-- LIVE CONTROL -->
    <div class="card">
        <h2><i class="fa-solid fa-tower-broadcast"></i> ניהול שידור חי</h2>
        <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 25px;">
            <span>סטטוס מערכת:</span>
            <div id="current-status" class="status-badge status-offline">
                <span id="status-text">טוען...</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>מלל חופשי / הודעה רצה בנגן</label>
            <textarea id="scrolling-text" placeholder="הכנס הודעה שתופיע בנגן (למשל: דרישת שלום, הודעה על תוכנית קרובה...)" rows="2"></textarea>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>שם השדרן</label>
                <input type="text" id="dj-name" placeholder="מי בשידור?">
            </div>
            <div class="form-group">
                <label>URL של הסטרים (Icecast/MP3)</label>
                <input type="text" id="stream-url" placeholder="לינק לנגן">
            </div>
        </div>
        <div class="grid" style="margin-bottom: 20px;">
            <div class="preview-area">
                <img id="dj-img-preview" class="preview-img" src="https://via.placeholder.com/60?text=DJ">
                <input type="file" id="dj-file-input" style="display:none" onchange="handleImageUpload('dj')">
                <button onclick="document.getElementById('dj-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">החלף תמונת שדרן</button>
            </div>
            <div class="preview-area">
                <img id="offline-img-preview" class="preview-img" src="https://via.placeholder.com/60?text=OFF">
                <input type="file" id="offline-file-input" style="display:none" onchange="handleImageUpload('offline')">
                <button onclick="document.getElementById('offline-file-input').click()" style="font-size: 11px; background: var(--secondary); flex:1">תמונת Offline</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-save" style="flex:2" onclick="updateLive()"><i class="fa-solid fa-play"></i> עדכן וצא לשידור</button>
            <button class="btn-clear" style="flex:1" onclick="clearLive()"><i class="fa-solid fa-stop"></i> הפסק שידור</button>
        </div>
    </div>

    <!-- WEEKLY SCHEDULE -->
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="border:none; margin:0; padding:0;"><i class="fa-solid fa-calendar-days"></i> לוח שידורים שבועי</h2>
            <button class="btn-danger-outline" onclick="clearEntireDay()">
                <i class="fa-solid fa-trash-can"></i> נקה את כל יום <span class="active-day-text">ראשון</span>
            </button>
        </div>
        
        <div class="schedule-tabs" id="day-tabs">
            <button class="tab-btn active" onclick="switchDay('sunday')">ראשון</button>
            <button class="tab-btn" onclick="switchDay('monday')">שני</button>
            <button class="tab-btn" onclick="switchDay('tuesday')">שלישי</button>
            <button class="tab-btn" onclick="switchDay('wednesday')">רביעי</button>
            <button class="tab-btn" onclick="switchDay('thursday')">חמישי</button>
            <button class="tab-btn" onclick="switchDay('friday')">שישי</button>
            <button class="tab-btn" onclick="switchDay('saturday')">שבת</button>
        </div>

        <!-- NEW: Free text for schedule -->
        <div class="form-group">
            <label>מלל חופשי ליום <span class="active-day-text">ראשון</span> (יופיע מעל לוח השידורים)</label>
            <textarea id="schedule-free-text" placeholder="למשל: יום שידורים מיוחד לרגל החג, הערות מיוחדות..." rows="2"></textarea>
        </div>

        <div id="schedule-editor">
            <div class="schedule-header">
                <div>שעה</div>
                <div>שם התוכנית</div>
                <div>שדרן/ית</div>
                <div>מחק</div>
            </div>
            <div id="time-slots-container">
                <!-- Slots rendered via JS -->
            </div>
        </div>

        <button class="btn-save" style="margin-top: 25px; width: 100%;" onclick="saveSchedule()">
            <i class="fa-solid fa-floppy-disk"></i> שמור שינויים ליום <span class="active-day-text">ראשון</span>
        </button>
    </div>

    <!-- EVENTS -->
    <div class="grid">
        <div class="card">
            <h2><i class="fa-solid fa-star"></i> אירוע 1</h2>
            <input type="text" id="p1-title" placeholder="כותרת האירוע" class="form-group">
            <div class="grid" style="gap:10px; grid-template-columns: 1fr 1fr;">
                <input type="text" id="p1-date" placeholder="תאריך ושעה" class="form-group">
                <input type="text" id="p1-link" placeholder="לינק לכרטיסים/מידע" class="form-group">
            </div>
            <textarea id="p1-free-text" placeholder="מלל חופשי (למשל: דגשים חשובים, מבצעים...)" rows="2" class="form-group"></textarea>
            <textarea id="p1-desc" placeholder="תיאור מלא של האירוע" rows="3"></textarea>
        </div>
        <div class="card">
            <h2><i class="fa-solid fa-calendar-check"></i> אירוע 2</h2>
            <input type="text" id="p2-title" placeholder="כותרת האירוע" class="form-group">
            <div class="grid" style="gap:10px; grid-template-columns: 1fr 1fr;">
                <input type="text" id="p2-date" placeholder="תאריך ושעה" class="form-group">
                <input type="text" id="p2-link" placeholder="לינק לכרטיסים/מידע" class="form-group">
            </div>
            <textarea id="p2-free-text" placeholder="מלל חופשי (למשל: דגשים חשובים, מבצעים...)" rows="2" class="form-group"></textarea>
            <textarea id="p2-desc" placeholder="תיאור מלא של האירוע" rows="3"></textarea>
        </div>
    </div>
    <button class="btn-save" onclick="updateParties()" style="margin-bottom: 50px; width:100%;"><i class="fa-solid fa-check"></i> שמור נתוני אירועים</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC48QIiMrUbZYb9_0r3i4mkbnWYpRBGmGI",
        authDomain: "radio-163cd.firebaseapp.com",
        projectId: "radio-163cd",
        appId: "1:367173200259:web:9f8e4e73cc354924c830e2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let djBase64 = "", offlineBase64 = "", currentDay = "sunday", fullSchedule = {};

    const timeSlots = [
        "08:00 - 10:00", "10:00 - 12:00", "12:00 - 14:00", 
        "14:00 - 16:00", "16:00 - 18:00", "18:00 - 20:00", 
        "20:00 - 22:00", "22:00 - 00:00", "00:00 - 08:00"
    ];

    const dayNames = {
        sunday: "ראשון", monday: "שני", tuesday: "שלישי", 
        wednesday: "רביעי", thursday: "חמישי", friday: "שישי", saturday: "שבת"
    };

    function renderSlots() {
        const container = document.getElementById('time-slots-container');
        container.innerHTML = '';
        timeSlots.forEach((slot, index) => {
            const div = document.createElement('div');
            div.className = 'schedule-row';
            div.innerHTML = `
                <div class="time-label">${slot}</div>
                <input type="text" id="prog-${index}" placeholder="שם התוכנית">
                <input type="text" id="host-${index}" placeholder="שדרן">
                <button class="btn-icon-delete" onclick="clearSlot(${index})" title="מחק שורה זו">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            `;
            container.appendChild(div);
        });
        loadAllSchedule();
    }

    async function loadAllSchedule() {
        db.collection('settings').doc('schedule').onSnapshot(doc => {
            if (doc.exists) {
                fullSchedule = doc.data();
                loadDayData();
            }
        });
    }

    function loadDayData() {
        clearInputs(false);
        const data = fullSchedule[currentDay];
        // Handle both old format (array only) and new format (object with slots and freeText)
        let slots = [];
        let freeText = "";

        if (data) {
            if (Array.isArray(data)) {
                slots = data;
            } else {
                slots = data.slots || [];
                freeText = data.freeText || "";
            }
        }

        document.getElementById('schedule-free-text').value = freeText;

        slots.forEach((slotData, i) => {
            if (i < timeSlots.length) {
                const progEl = document.getElementById(`prog-${i}`);
                const hostEl = document.getElementById(`host-${i}`);
                if(progEl) progEl.value = slotData.title || "";
                if(hostEl) hostEl.value = slotData.host || "";
            }
        });
    }

    function switchDay(day) {
        currentDay = day;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.innerText === dayNames[day]);
        if(activeBtn) activeBtn.classList.add('active');
        document.querySelectorAll('.active-day-text').forEach(el => el.innerText = dayNames[day]);
        loadDayData();
    }

    function clearInputs(confirmAction = true) {
        if (confirmAction && !confirm(`האם אתה בטוח שברצונך לנקות את כל השורות ביום ${dayNames[currentDay]}?`)) return;
        timeSlots.forEach((_, i) => {
            const prog = document.getElementById(`prog-${i}`);
            const host = document.getElementById(`host-${i}`);
            if(prog) prog.value = "";
            if(host) host.value = "";
        });
        if(confirmAction) document.getElementById('schedule-free-text').value = "";
    }

    function clearSlot(index) {
        const prog = document.getElementById(`prog-${index}`);
        const host = document.getElementById(`host-${index}`);
        if(prog) prog.value = "";
        if(host) host.value = "";
    }

    function clearEntireDay() {
        clearInputs(true);
    }

    async function saveSchedule() {
        const slotsArray = timeSlots.map((slot, i) => ({
            time: slot,
            title: document.getElementById(`prog-${i}`).value.trim(),
            host: document.getElementById(`host-${i}`).value.trim()
        }));

        const freeText = document.getElementById('schedule-free-text').value.trim();

        // Save as an object containing both the slots and the free text
        fullSchedule[currentDay] = {
            slots: slotsArray,
            freeText: freeText
        };

        try {
            await db.collection('settings').doc('schedule').set(fullSchedule);
            alert(`נתוני יום ${dayNames[currentDay]} (כולל מלל חופשי) עודכנו בלוח השידורים!`);
        } catch (e) { alert("שגיאה בעדכון: " + e.message); }
    }

    // Live Info Logic
    db.collection('settings').doc('dj_info').onSnapshot(doc => {
        if(doc.exists) {
            const d = doc.data();
            document.getElementById('dj-name').value = d.name || "";
            document.getElementById('stream-url').value = d.streamUrl || "";
            document.getElementById('scrolling-text').value = d.scrollingText || "";
            if(d.image) document.getElementById('dj-img-preview').src = d.image;
            if(d.offlineImage) document.getElementById('offline-img-preview').src = d.offlineImage;
            
            const badge = document.getElementById('current-status'), txt = document.getElementById('status-text');
            if(d.name && d.name !== "") {
                txt.innerText = "בשידור: " + d.name; badge.className = "status-badge status-live";
            } else {
                txt.innerText = "OFFLINE"; badge.className = "status-badge status-offline";
            }
        }
    });

    async function updateLive() {
        const name = document.getElementById('dj-name').value;
        const sUrl = document.getElementById('stream-url').value;
        const sText = document.getElementById('scrolling-text').value;
        await db.collection('settings').doc('dj_info').set({
            name: name,
            streamUrl: sUrl,
            scrollingText: sText,
            image: djBase64 || document.getElementById('dj-img-preview').src,
            offlineImage: offlineBase64 || document.getElementById('offline-img-preview').src
        }, { merge: true });
        alert("סטטוס שידור ומלל עודכנו!");
    }

    async function clearLive() {
        const offImg = document.getElementById('offline-img-preview').src;
        await db.collection('settings').doc('dj_info').update({ name: "", image: offImg });
        alert("השידור הופסק");
    }

    function handleImageUpload(type) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas');
                cvs.width = 400; cvs.height = 400;
                cvs.getContext('2d').drawImage(img, 0, 0, 400, 400);
                const url = cvs.toDataURL('image/jpeg', 0.7);
                if(type === 'dj') { djBase64 = url; document.getElementById('dj-img-preview').src = url; }
                else { offlineBase64 = url; document.getElementById('offline-img-preview').src = url; }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function updateParties() {
        const data = {
            party1: { 
                title: document.getElementById('p1-title').value, 
                date: document.getElementById('p1-date').value, 
                link: document.getElementById('p1-link').value, 
                freeText: document.getElementById('p1-free-text').value,
                desc: document.getElementById('p1-desc').value 
            },
            party2: { 
                title: document.getElementById('p2-title').value, 
                date: document.getElementById('p2-date').value, 
                link: document.getElementById('p2-link').value, 
                freeText: document.getElementById('p2-free-text').value,
                desc: document.getElementById('p2-desc').value 
            }
        };
        await db.collection('settings').doc('parties_info').set(data);
        alert("נתוני אירועים עודכנו!");
    }

    // Load Events Initial Data
    db.collection('settings').doc('parties_info').get().then(doc => {
        if(doc.exists) {
            const d = doc.data();
            if(d.party1) {
                document.getElementById('p1-title').value = d.party1.title || "";
                document.getElementById('p1-date').value = d.party1.date || "";
                document.getElementById('p1-link').value = d.party1.link || "";
                document.getElementById('p1-free-text').value = d.party1.freeText || "";
                document.getElementById('p1-desc').value = d.party1.desc || "";
            }
            if(d.party2) {
                document.getElementById('p2-title').value = d.party2.title || "";
                document.getElementById('p2-date').value = d.party2.date || "";
                document.getElementById('p2-link').value = d.party2.link || "";
                document.getElementById('p2-free-text').value = d.party2.freeText || "";
                document.getElementById('p2-desc').value = d.party2.desc || "";
            }
        }
    });

    renderSlots();
</script>
</body>
</html>
